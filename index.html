async function createLogin(name,email,site_id,role){
  // Send the app's own URL so the invite link brings them back here to set a password.
  const redirect_to=window.location.origin+window.location.pathname;
  const r=await fetch(`${DB_URL}/functions/v1/create-user`,{method:'POST',headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()}`,'Content-Type':'application/json'},body:JSON.stringify({email,name,site_id,role,redirect_to})});
  const t=await r.text();const j=t?JSON.parse(t):null;
  if(!r.ok)throw new Error((j&&(j.error||j.message||j.msg||j.error_description))||('Create failed ('+r.status+')'));
  return j;
}
async function submitCreateLogin(){
  const name=(document.getElementById('cl-name')?.value||'').trim();
  const email=(document.getElementById('cl-email')?.value||'').trim();
  const site_id=document.getElementById('cl-site')?.value||'';
  const role=document.getElementById('cl-role')?.value||'member';
  const err=document.getElementById('cl-err');if(err)err.style.display='none';
  if(!name||!email||!site_id){if(err){err.style.display='block';err.textContent='Enter a name, email and site.';}return;}
  const btn=document.getElementById('cl-go');if(btn){btn.disabled=true;btn.textContent='Creating…';}
  try{
    await createLogin(name,email,site_id,role);
    closeAnyModal();S.um=null;draw();setTimeout(loadUsers,0);showToast('✓ Invite email sent');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Create login';}
    if(err){err.style.display='block';err.textContent=(e&&e.message)?e.message:'Create failed.';}
  }
}
async function setUserRole(uid,sid,role){
  if(!USER_ROLES.some(r=>r[0]===role)){showToast('Unknown role');return;}
  try{
    await sb(`user_sites?user_id=eq.${uid}&site_id=eq.${sid}`,{method:'PATCH',body:JSON.stringify({role})});
    const r=(S.um.userSites||[]).find(x=>x.user_id===uid&&x.site_id===sid);if(r)r.role=role;
    draw();showToast('✓ Role updated');
  }catch(e){showToast('Failed: '+e.message);}
}
async function removeUserSite(uid,sid,label){
  if(!confirm('Remove this person from '+(label||'this site')+'?'))return;
  try{
    await sb(`user_sites?user_id=eq.${uid}&site_id=eq.${sid}`,{method:'DELETE'});
    S.um.userSites=(S.um.userSites||[]).filter(x=>!(x.user_id===uid&&x.site_id===sid));
    draw();showToast('✓ Removed');
  }catch(e){showToast('Failed: '+e.message);}
}
async function assignUserSite(uid){
  const sel=document.getElementById('assign-'+uid);const sid=sel?sel.value:'';
  if(!sid){showToast('Pick a site first');return;}
  const rsel=document.getElementById('assign-role-'+uid);
  const role=(rsel&&rsel.value)||'member';
  if(!USER_ROLES.some(r=>r[0]===role)){showToast('Pick a valid role');return;}
  try{
    const res=await sb('user_sites',{method:'POST',body:JSON.stringify({user_id:uid,site_id:sid,role})});
    const nr=Array.isArray(res)?res[0]:res;S.um.userSites.push(nr&&nr.user_id?nr:{user_id:uid,site_id:sid,role});
    draw();showToast('✓ Assigned as '+role);
  }catch(e){showToast('Failed: '+e.message);}
}
// ── V4.3: delete board (owner or site admin) ──
function canDeleteBoard(b){return !!b&&(isOwner()||myAdminSiteIds().indexOf(b.site_id)>=0);}
function deleteBoardPrompt(boardId){
  const b=(S.boards||[]).find(x=>x.id===boardId);if(!b)return;
  if(!canDeleteBoard(b)){promptLogin();return;}
  showModal(`<div class="modal-title">Delete this board?</div>
    <div class="info-note" style="margin-bottom:12px;border-left:3px solid #A32D2D">This permanently deletes <strong>${esc(b.name)}</strong> and everything on it — circuits, RCDs, floor plans and all test history. This can’t be undone.</div>
    <div id="del-counts" style="font-size:12px;color:#888;margin:0 2px 12px">Checking what will be removed…</div>
    <div class="err-msg" id="del-err"></div>
    <button class="primary-btn" id="del-go" style="background:#A32D2D" onclick="confirmDeleteBoard('${b.id}')">Delete permanently</button>
    <button class="cancel-btn" onclick="closeAnyModal()">Cancel</button>`);
  (async function(){
    try{
      const[cir,rc]=await Promise.all([sb(`circuits?board_id=eq.${boardId}&select=id`),sb(`rcds?board_id=eq.${boardId}&select=id`)]);
      const el=document.getElementById('del-counts');
      if(el)el.textContent=`Will remove ${(cir||[]).length} circuit${(cir||[]).length===1?'':'s'}, ${(rc||[]).length} RCD${(rc||[]).length===1?'':'s'} and their test history.`;
    }catch(e){const el=document.getElementById('del-counts');if(el)el.textContent='';}
  })();
}
async function confirmDeleteBoard(boardId){
  const btn=document.getElementById('del-go'),err=document.getElementById('del-err');
  if(err)err.style.display='none';if(btn){btn.disabled=true;btn.textContent='Deleting…';}
  try{
    const rcds=await sb(`rcds?board_id=eq.${boardId}&select=id`);
    for(const r of (rcds||[])){await sb(`rcd_tests?rcd_id=eq.${r.id}`,{method:'DELETE'});}
    await sb(`circuits?board_id=eq.${boardId}`,{method:'DELETE'});
    if((rcds||[]).length)await sb(`rcds?board_id=eq.${boardId}`,{method:'DELETE'});
    await sb(`boards?id=eq.${boardId}`,{method:'DELETE'});
    const fresh=await sb('boards?select=*');
    if((fresh||[]).some(b=>b.id===boardId))throw new Error('the board is still there — your database may need a delete (RLS) policy for owners/admins.');
    S.boards=fresh||(S.boards||[]).filter(b=>b.id!==boardId);
    if(S.selectedBoard&&S.selectedBoard.id===boardId)S.selectedBoard=null;
    closeAnyModal();draw();showToast('✓ Board deleted');
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent='Delete permanently';}
    if(err){err.style.display='block';err.textContent='Delete failed: '+((e&&e.message)||'unknown');}
  }
}

async function shareBoard(){

    try{await navigator.share({title:name+' — Switchboard Legend',text:'Scan or tap to view the switchboard legend for '+name,url});}
    catch(e){if(e.name!=='AbortError')copyURL(url);}
  }else{copyURL(url);}

function downloadQR(){
  const name=S._qrName||'switchboard';
  const canvas=document.querySelector('#qr-container canvas');
  if(!canvas){showToast('QR code not loaded yet');return;}
  const a=document.createElement('a');
  a.href=canvas.toDataURL('image/png');
  a.download=name.replace(/[^a-z0-9]/gi,'-').toLowerCase()+'-qr.png';
  a.click();
  showToast('✓ QR code downloaded');
}

function copyURL(url){
  navigator.clipboard?.writeText(url).then(()=>showToast('✓ URL copied')).catch(()=>{
    const t=document.createElement('textarea');t.value=url;document.body.appendChild(t);t.select();document.execCommand('copy');t.remove();showToast('✓ URL copied');
  });
}

async function doAddBoard(){

function openEditUser(id){

  });

async function doEditUser(id){
  const name=(document.getElementById('eu-name')?.value||'').trim();
  if(!name){const err=document.getElementById('eu-err');if(err){err.style.display='block';err.textContent='Name cannot be empty.';}return;}
  const pin=(document.getElementById('eu-pin')?.value||'').trim();
  if(pin&&pin.length!==4){const err=document.getElementById('eu-err');if(err){err.style.display='block';err.textContent='PIN must be exactly 4 digits.';}return;}
  const btn=document.getElementById('eu-save');if(btn)btn.disabled=true;
  const data={name,role:window._euRole||'editor'};
  if(pin)data.pin_hash=pin;
  try{
    const res=await sb(`users?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(data)});
    const updated=Array.isArray(res)?res[0]:res;
    S.users=S.users.map(u=>u.id===updated.id?updated:u);
    document.querySelector('.modal-overlay')?.remove();
    draw();showToast('✓ User updated');
  }catch(e){
    if(btn)btn.disabled=false;
    const err=document.getElementById('eu-err');
    if(err){err.style.display='block';err.textContent='Failed: '+e.message;}
  }
}

}

async function doDeleteUser(id){
  const btn=document.getElementById('du-save');if(btn)btn.disabled=true;
  try{
    await sb(`users?id=eq.${id}`,{method:'DELETE'});

    if(btn)btn.disabled=false;
    const err=document.getElementById('du-err');
    if(err){err.style.display='block';err.textContent='Failed: '+e.message;}
  }
}

// ── Data load ──
async function loadPlans(){
  if(S.plan.loading)return;
  S.plan.loading=true;
  try{
    const plans=await sb(`floor_plans?board_id=eq.${S.selectedBoard.id}&order=created_at.asc`);
    S.plan.plans=plans||[];
    S.plan.current=plans&&plans.length?plans[0]:null;
    await loadPlanItems();
    S.plan.loaded=true;S.plan.loading=false;
    if(S.view==='board'&&S.tab==='plan')draw();
  }catch(e){
    S.plan.loading=false;S.plan.loaded=true;S.plan.current=null;
    if(S.view==='board'&&S.tab==='plan')draw();
    showToast('Floor plan load failed');

}
async function loadPlanItems(){
  S.plan.view=null;
  if(S.plan.current){
    const items=await sb(`circuit_icons?floor_plan_id=eq.${S.plan.current.id}`);
    S.plan.items=items||[];
    S.plan.walls=Array.isArray(S.plan.current.walls)?S.plan.current.walls:[];
    S.plan.items.forEach(it=>{const ox=it.x,oy=it.y;clampToPlan(it);if(it.x!==ox||it.y!==oy)persistItem(it.id,{x:Math.round(it.x),y:Math.round(it.y)});});

}

    const p=[..._ptrs.values()];const dd=Math.hypot(p[0].x-p[1].x,p[0].y-p[1].y)||1;const mx=(p[0].x+p[1].x)/2,my=(p[0].y+p[1].y)/2;const r=_g.rect;const d=planDims();
    let nw=_g.sv.w*(_g.startDist/dd);nw=Math.max(d.w*0.12,Math.min(d.w,nw));const nh=nw*(d.h/d.w);
    S.plan.view={x:_g.w0x-((mx-r.left)/r.width)*nw,y:_g.w0y-((my-r.top)/r.height)*nh,w:nw,h:nh};clampView();applyView();return;
  }
  if(_g&&_g.type==='tap'){const dx=e.clientX-_g.sx,dy=e.clientY-_g.sy;if(Math.abs(dx)>6||Math.abs(dy)>6){_g.type='pan';_g.moved=true;}}
  if(_g&&_g.type==='pan'){const r=_g.rect;const dx=e.clientX-_g.sx,dy=e.clientY-_g.sy;S.plan.view={x:_g.sv.x-dx*(_g.sv.w/r.width),y:_g.sv.y-dy*(_g.sv.h/r.height),w:_g.sv.w,h:_g.sv.h};clampView();applyView();return;}
  if(e.pointerType==='mouse'&&S.plan.editMode&&S.plan.tool==='walls'&&S.plan.wallDraft&&_g&&_g.type==='tap'){
    const pt=clientToPlan(e.clientX,e.clientY);const sn=wallEndPoint(pt.x,pt.y);S.plan.wallDraft.x2=sn.x;S.plan.wallDraft.y2=sn.y;renderWallsLayer();
  }
}
function onSvgPointerUp(e){
  const wasTap=_g&&_g.type==='tap'&&!_g.moved;_ptrs.delete(e.pointerId);
  if(wasTap&&_ptrs.size===0)svgTap(e);
  if(_ptrs.size===0)_g=null;
  else if(_ptrs.size===1){const pos=[..._ptrs.values()][0];_g={type:'pan',sx:pos.x,sy:pos.y,moved:true,rect:svgRect(),sv:{x:S.plan.view.x,y:S.plan.view.y,w:S.plan.view.w,h:S.plan.view.h},ptype:e.pointerType};}
}
function svgTap(e){
  const {x,y}=clientToPlan(e.clientX,e.clientY);
  if(S.plan.editMode&&S.plan.tool==='walls'){if(S.plan.wallTool==='erase'){eraseWallAt(x,y);}else{handleWallClick(x,y);}return;}
  if(S.plan.editMode&&S.plan.placingType){addPlacement(S.plan.placingType,x,y);return;}
  if(S.plan.selectedId){S.plan.selectedId=null;S.plan.hoverId=null;renderPlan();renderPlanActions();}
}
function onItemPointerDown(e,id){
  e.stopPropagation();
  const it=itemById(id);if(!it)return;
  if(!S.plan.editMode){S.plan.selectedId=id;S.plan.hoverId=id;renderPlan();renderPlanActions();return;}
  S.plan.selectedId=id;S.plan.hoverId=null;renderPlanActions();
  document.getElementById('pl-handles').innerHTML='';
  const start=clientToPlan(e.clientX,e.clientY);const ox=it.x,oy=it.y;let moved=false;
  const move=ev=>{
    const p=clientToPlan(ev.clientX,ev.clientY);
    let nx=ox+(p.x-start.x),ny=oy+(p.y-start.y);
    if(Math.abs(p.x-start.x)>2||Math.abs(p.y-start.y)>2)moved=true;
    const sn=applySnaps(it,nx,ny);
    it.x=sn.x;it.y=sn.y;if(sn.rotation!=null)it.rotation=sn.rotation;
    clampToPlan(it);
    updateItemTransform(it);
  };
  const up=()=>{
    document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);clearGuides();
    if(moved){it.x=Math.round(it.x);it.y=Math.round(it.y);persistItem(it.id,{x:it.x,y:it.y,rotation:it.rotation});}
    renderPlan();renderPlanActions();
  };
  document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
}
function onHandlePointerDown(e,name){
  e.stopPropagation();
  const it=itemById(S.plan.selectedId);if(!it)return;
  document.getElementById('pl-handles').innerHTML='';
  const move=ev=>{
    const p=clientToPlan(ev.clientX,ev.clientY);
    if(name==='rotate'){it.rotation=Math.round(Math.atan2(p.y-it.y,p.x-it.x)*180/Math.PI+90);updateItemTransform(it);}
    else if(name==='scale'){const base=26*K();let s=dist(it.x,it.y,p.x,p.y)/base;s=Math.max(0.5,Math.min(3,Math.round(s*10)/10));it.scale=s;updateItemTransform(it);}
    else if(name==='end1'||name==='end2'){
      const k=K();const rot=(it.rotation||0)*Math.PI/180;const dx=Math.cos(rot),dy=Math.sin(rot);const hw=(+it.length||DEFAULT_LEN[it.icon_type]*k)/2;
      const e1={x:it.x-dx*hw,y:it.y-dy*hw},e2={x:it.x+dx*hw,y:it.y+dy*hw};
      const fixed=name==='end1'?e2:e1;
      if(BATTEN.has(it.icon_type)){
        const sdeg=Math.round(Math.atan2(p.y-fixed.y,p.x-fixed.x)/(Math.PI/2))*90;
        const sr=sdeg*Math.PI/180,ux=Math.cos(sr),uy=Math.sin(sr);
        const L=Math.max(20*k,(p.x-fixed.x)*ux+(p.y-fixed.y)*uy);
        it.length=Math.round(L);it.rotation=((sdeg%360)+360)%360;
        it.x=Math.round(fixed.x+ux*L/2);it.y=Math.round(fixed.y+uy*L/2);
      }else{
        const ndx=p.x-fixed.x,ndy=p.y-fixed.y;const L=Math.max(20*k,Math.hypot(ndx,ndy));
        it.length=Math.round(L);it.rotation=Math.round(Math.atan2(ndy,ndx)*180/Math.PI);
        it.x=Math.round((fixed.x+p.x)/2);it.y=Math.round((fixed.y+p.y)/2);
      }
      clampToPlan(it);
      renderItemsLayer();
    }
  };
  const up=()=>{
    document.removeEventListener('pointermove',move);document.removeEventListener('pointerup',up);
    persistItem(it.id,{rotation:it.rotation,scale:it.scale,length:it.length,x:Math.round(it.x),y:Math.round(it.y)});
    if(BATTEN.has(it.icon_type))propagateBattenLength(it);
    renderPlan();renderPlanActions();
  };
  document.addEventListener('pointermove',move);document.addEventListener('pointerup',up);
}

// ── Snapping ──
function nearestWall(x,y,thr){
  let best=null;
  S.plan.walls.forEach(w=>{const pr=projPointSeg(x,y,w.x1,w.y1,w.x2,w.y2);const d=dist(x,y,pr.x,pr.y);if(d<thr&&(!best||d<best.d)){let nx=-(w.y2-w.y1),ny=(w.x2-w.x1);const nl=Math.hypot(nx,ny)||1;best={x:pr.x,y:pr.y,fx:pr.x,fy:pr.y,nx:nx/nl,ny:ny/nl,angle:Math.atan2(w.y2-w.y1,w.x2-w.x1)*180/Math.PI,d};}});
  return best;
}
function wallSnapPos(it,x,y){
  const off=18*K()*(it.scale||1);
  const ws=nearestWall(x,y,off+16*K());if(!ws)return null;
  const side=((x-ws.fx)*ws.nx+(y-ws.fy)*ws.ny)>=0?1:-1;
  return {x:ws.fx+ws.nx*off*side,y:ws.fy+ws.ny*off*side,rotation:ws.angle};
}
function itemHalf(it){const k=K();if(LINEAR.has(it.icon_type)){return {hx:(+it.length||DEFAULT_LEN[it.icon_type]*k)/2,hy:5*k};}const sc=k*(it.scale||1);return {hx:24*sc,hy:24*sc};}
function applySnaps(it,nx,ny){
  const k=K();
  // wall snap: outer edge against the wall, either side, auto-orient (point fittings)
  if(!LINEAR.has(it.icon_type)){const wsp=wallSnapPos(it,nx,ny);if(wsp){setGuides([]);return {x:wsp.x,y:wsp.y,rotation:wsp.rotation};}}
  // alignment to other fittings — match centre OR edge, H/V (visual aid; snaps like Canva, centre preferred)
  const thr=7*k;const me=itemHalf(it);const xT=[],yT=[];
  S.plan.items.forEach(o=>{if(o.id===it.id)return;const oh=itemHalf(o);xT.push([o.x,1],[o.x-oh.hx,0],[o.x+oh.hx,0]);yT.push([o.y,1],[o.y-oh.hy,0],[o.y+oh.hy,0]);});
  const pick=(n,anchors,targets)=>{let best=null;anchors.forEach(([a,ac])=>targets.forEach(([lt,tc])=>{const dd=Math.abs((n+a)-lt);if(dd<thr){const score=dd-((ac&&tc)?1000:0);if(!best||score<best.score)best={pos:lt-a,guide:lt,score};}}));return best;};
  const sx=pick(nx,[[0,1],[-me.hx,0],[me.hx,0]],xT);
  const sy=pick(ny,[[0,1],[-me.hy,0],[me.hy,0]],yT);
  if(sx)nx=sx.pos;if(sy)ny=sy.pos;
  const guides=[];if(sx)guides.push(['v',sx.guide]);if(sy)guides.push(['h',sy.guide]);
  setGuides(guides);
  return {x:nx,y:ny,rotation:null};
}
function snapWallPoint(x,y){const thr=14*K();let best=null;S.plan.walls.forEach(w=>{[[w.x1,w.y1],[w.x2,w.y2]].forEach(([px,py])=>{const d=dist(x,y,px,py);if(d<thr&&(!best||d<best.d))best={x:px,y:py,d};});});return best||{x,y};}
function orthoSnap(x1,y1,x,y){const dx=x-x1,dy=y-y1;if(Math.abs(dx)<1e-6&&Math.abs(dy)<1e-6)return{x,y};const a=Math.round(Math.atan2(dy,dx)/(Math.PI/4))*(Math.PI/4);const ux=Math.cos(a),uy=Math.sin(a);const proj=dx*ux+dy*uy;return{x:x1+ux*proj,y:y1+uy*proj};}
function wallEndPoint(x,y){const ep=snapWallPoint(x,y);const corner=(ep.x!==x||ep.y!==y);if(S.plan.wallDraft&&!corner)return orthoSnap(S.plan.wallDraft.x1,S.plan.wallDraft.y1,x,y);return ep;}
function maybeSnapToWall(it){if(LINEAR.has(it.icon_type))return;const wsp=wallSnapPos(it,it.x,it.y);if(wsp){it.x=Math.round(wsp.x);it.y=Math.round(wsp.y);it.rotation=Math.round(wsp.rotation);persistItem(it.id,{x:it.x,y:it.y,rotation:it.rotation});}}

// ── CRUD ──
async function addPlacement(type,x,y){
  const k=K();
  const data={floor_plan_id:S.plan.current.id,icon_type:type,x:Math.round(x),y:Math.round(y),rotation:0,scale:1};
  if(LINEAR.has(type)){const ex=BATTEN.has(type)?S.plan.items.filter(x=>x.icon_type===type&&x.length).pop():null;data.length=ex?ex.length:Math.round(DEFAULT_LEN[type]*k);}
  if(/^sw[1-6]$/.test(type)||type==='sw2w')data.gang_number=gangCount(type);
  if(S.plan.placingCircuit)data.circuit_id=S.plan.placingCircuit;
  try{
    const res=await sb('circuit_icons',{method:'POST',body:JSON.stringify(data)});
    const ni=Array.isArray(res)?res[0]:res;
    S.plan.items.push(ni);S.plan.selectedId=null;S.plan.placeCount=(S.plan.placeCount||0)+1;
    maybeSnapToWall(ni);
    renderPlan();renderPlanActions();
    showToast('✓ '+(ICON_META[type]?ICON_META[type].name:type)+' placed');
  }catch(e){showToast('Failed: '+e.message);}
}
async function persistItem(id,patch){const it=itemById(id);if(it)Object.assign(it,patch);try{await sb(`circuit_icons?id=eq.${id}`,{method:'PATCH',body:JSON.stringify(patch)});}catch(e){showToast('Save failed');}}
function propagateBattenLength(it){S.plan.items.forEach(o=>{if(o.id!==it.id&&o.icon_type===it.icon_type&&o.length!==it.length)persistItem(o.id,{length:it.length});});}
async function deleteSelected(){
  const id=S.plan.selectedId;if(!id)return;
  try{await sb(`circuit_icons?id=eq.${id}`,{method:'DELETE'});S.plan.items=S.plan.items.filter(x=>x.id!==id);S.plan.selectedId=null;renderPlan();renderPlanActions();showToast('✓ Deleted');}
  catch(e){showToast('Delete failed');}
}
function setItemCircuit(cid){const id=S.plan.selectedId;persistItem(id,{circuit_id:cid});closeAnyModal();renderPlan();renderPlanActions();showToast(cid?'✓ Linked to circuit':'✓ Unlinked');}
function setItemSwitch(swId,gang){const id=S.plan.selectedId;persistItem(id,{switch_plate_id:swId,gang_index:gang});closeAnyModal();renderPlan();showToast(swId?'✓ Switch loop set':'✓ Loop removed');}

// ── Nudge / duplicate ──
let _nudgeTimer=null;
function nudgeStep(){const v=S.plan.view||planView();return Math.max(1,v.w/240);}
function nudgeBtn(sx,sy){const s=nudgeStep();nudgeSelected(sx*s,sy*s);}
function nudgeSelected(dx,dy){
  const it=itemById(S.plan.selectedId);if(!it)return;
  it.x=Math.round(it.x+dx);it.y=Math.round(it.y+dy);clampToPlan(it);
  updateItemTransform(it);
  const hg=document.getElementById('pl-handles');if(hg)hg.innerHTML=handlesMarkup();
  clearTimeout(_nudgeTimer);_nudgeTimer=setTimeout(()=>persistItem(it.id,{x:it.x,y:it.y}),350);
}
async function duplicateSelected(){
  const it=itemById(S.plan.selectedId);if(!it)return;
  const off=Math.round(16*K());
  const data={floor_plan_id:S.plan.current.id,icon_type:it.icon_type,x:Math.round(it.x)+off,y:Math.round(it.y)+off,rotation:it.rotation||0,scale:it.scale||1};
  if(it.length)data.length=it.length;
  if(it.gang_number)data.gang_number=it.gang_number;
  if(it.circuit_id)data.circuit_id=it.circuit_id;
  if(it.switch_plate_id){data.switch_plate_id=it.switch_plate_id;data.gang_index=it.gang_index;}
  try{
    const res=await sb('circuit_icons',{method:'POST',body:JSON.stringify(data)});
    const ni=Array.isArray(res)?res[0]:res;
    S.plan.items.push(ni);S.plan.selectedId=ni.id;
    renderPlan();renderPlanActions();showToast('✓ Duplicated');
  }catch(e){showToast('Duplicate failed: '+e.message);}
}
function onPlanKey(e){
  if(!(S.view==='board'&&S.tab==='plan'&&S.plan.editMode))return;
  if(document.querySelector('.modal-overlay'))return;
  const tag=(e.target&&e.target.tagName)||'';
  if(tag==='INPUT'||tag==='TEXTAREA'||tag==='SELECT')return;
  const it=S.plan.selectedId?itemById(S.plan.selectedId):null;
  if(!it)return;
  if((e.ctrlKey||e.metaKey)&&(e.key==='d'||e.key==='D')){e.preventDefault();duplicateSelected();return;}
  if(e.key==='Delete'){e.preventDefault();deleteSelected();return;}
  const step=(e.shiftKey?12:3)*K();
  if(e.key==='ArrowLeft'){e.preventDefault();nudgeSelected(-step,0);}
  else if(e.key==='ArrowRight'){e.preventDefault();nudgeSelected(step,0);}
  else if(e.key==='ArrowUp'){e.preventDefault();nudgeSelected(0,-step);}
  else if(e.key==='ArrowDown'){e.preventDefault();nudgeSelected(0,step);}
}

// ── Walls ──
function startWalls(){S.plan.tool='walls';S.plan.wallTool='draw';S.plan.selectedId=null;S.plan.placingType=null;S.plan.wallDraft=null;renderPlanActions();renderPlan();showToast('Tap to trace walls');}
function endWalls(){S.plan.tool='select';S.plan.wallTool='draw';S.plan.wallDraft=null;renderPlanActions();renderPlan();}
function undoWall(){if(S.plan.wallDraft){S.plan.wallDraft=null;}else{S.plan.walls.pop();persistWalls();}renderPlan();}
function handleWallClick(x,y){
  if(!S.plan.wallDraft){const sn=snapWallPoint(x,y);S.plan.wallDraft={x1:Math.round(sn.x),y1:Math.round(sn.y),x2:Math.round(sn.x),y2:Math.round(sn.y)};renderWallsLayer();}
  else{const p=wallEndPoint(x,y);const d=S.plan.wallDraft;const seg={x1:d.x1,y1:d.y1,x2:Math.round(p.x),y2:Math.round(p.y)};if(dist(seg.x1,seg.y1,seg.x2,seg.y2)>3){S.plan.walls.push(seg);persistWalls();}S.plan.wallDraft={x1:seg.x2,y1:seg.y2,x2:seg.x2,y2:seg.y2};renderWallsLayer();}
}
async function persistWalls(){try{await sb(`floor_plans?id=eq.${S.plan.current.id}`,{method:'PATCH',body:JSON.stringify({walls:S.plan.walls})});S.plan.current.walls=S.plan.walls.slice();}catch(e){showToast('Wall save failed');}}
function setWallTool(t){S.plan.wallTool=t;S.plan.wallDraft=null;renderPlanActions();renderPlan();}
function eraseWallAt(x,y){
  const thr=14*K();let bi=-1,bd=thr;
  S.plan.walls.forEach((w,i)=>{const pr=projPointSeg(x,y,w.x1,w.y1,w.x2,w.y2);const d=dist(x,y,pr.x,pr.y);if(d<bd){bd=d;bi=i;}});
  if(bi>=0){S.plan.walls.splice(bi,1);persistWalls();renderPlan();renderPlanActions();showToast('✓ Wall deleted');}
}
function confirmClearWalls(){
  if(!S.plan.walls.length){showToast('No walls to clear');return;}
  showModal(`<div class="modal-title">Clear all walls?</div><p style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.6">Removes every wall on <strong>${esc(S.plan.current.name||'this plan')}</strong> (${S.plan.walls.length} segment${S.plan.walls.length===1?'':'s'}). Fittings are not affected.</p><button class="primary-btn" style="background:#A32D2D;color:#fff" onclick="clearAllWalls()">Yes, clear walls</button><button class="cancel-btn" onclick="closeAnyModal()">Cancel</button>`);
}
function clearAllWalls(){closeAnyModal();S.plan.walls=[];S.plan.wallDraft=null;persistWalls();renderPlan();renderPlanActions();showToast('✓ All walls cleared');}

// ── Toolbar / bar ──
function renderPlanBar(){
  const bar=document.getElementById('plan-bar');if(!bar||!S.plan.current)return;
  let h=S.plan.plans.map(p=>`<div class="plan-chip ${p.id===S.plan.current.id?'sel':''}" onclick="switchPlan('${p.id}')">${esc(p.name||'Plan')}</div>`).join('');
  h+=`<div class="plan-chip" style="border-style:dashed" onclick="openAddPlan()">＋ Plan</div>`;
  h+=`<div class="plan-chip" onclick="resetView()">⤢ Fit</div>`;
  const opts=['<option value="">All circuits</option>'].concat(S.circuits.slice().sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0)).map(c=>`<option value="${c.id}" ${S.plan.filterCircuit===c.id?'selected':''}>C${esc(c.number)} ${esc(c.label||'')}</option>`));
  h+=`<select class="plan-filter" onchange="setFilter(this.value)">${opts.join('')}</select>`;
  bar.innerHTML=h;
}
function setFilter(v){S.plan.filterCircuit=v||null;renderPlan();}
function renderPlanActions(){
  const bar=document.getElementById('plan-actions');if(!bar)return;const pl=S.plan;
  if(!pl.editMode){
    if(pl.selectedId){const it=itemById(pl.selectedId);const circ=it&&it.circuit_id?S.circuits.find(c=>c.id===it.circuit_id):null;const nm=it?(ICON_META[it.icon_type]?ICON_META[it.icon_type].name:it.icon_type):'';bar.innerHTML=`<div class="plan-hint">${esc(nm)}${circ?' · Circuit '+esc(circ.number):''}${it&&it.switch_plate_id?' · switch loop shown':''}</div>`+(circ?`<button class="add-btn" onclick="selCircuit('${circ.id}')">Open circuit</button>`:'')+`<button class="ghost-btn" onclick="deselect()">Hide</button>`;return;}
    bar.innerHTML=`<div class="plan-hint">${pl.items.length} fitting${pl.items.length===1?'':'s'} placed${pl.items.length?' · tap a fitting for its circuit & switch loop · pinch to zoom':''}</div>${S.readOnly?'':`<button class="add-btn" onclick="enterPlanEdit()">✏ Edit plan</button>`}`;return;
  }
  if(pl.tool==='walls'){
    if(pl.wallTool==='erase'){bar.innerHTML=`<div class="plan-hint">Erase mode — tap any wall to delete it.</div><button class="icon-tool danger" onclick="confirmClearWalls()">🗑 Clear all</button><button class="icon-tool" onclick="setWallTool('draw')">✏ Draw</button><button class="add-btn" onclick="endWalls()">Done</button>`;}
    else{bar.innerHTML=`<div class="plan-hint">Tracing walls — tap corners; lines auto-straighten to right angles. Tap an existing corner to close.</div><button class="icon-tool" onclick="undoWall()">↶ Undo</button><button class="icon-tool" onclick="setWallTool('erase')">🧽 Erase</button><button class="add-btn" onclick="endWalls()">Done walls</button>`;}
    return;
  }
  if(pl.placingType){const m=ICON_META[pl.placingType];const n=pl.placeCount||0;const cc=pl.placingCircuit?S.circuits.find(c=>c.id===pl.placingCircuit):null;bar.innerHTML=`<div class="plan-hint">Placing ${esc(m?m.name:pl.placingType)}${cc?' on C'+esc(cc.number):''} — tap to drop, keep tapping for more${n?(' · '+n+' placed'):''}.</div><button class="icon-tool" onclick="openPalette()">Change</button><button class="ghost-btn" onclick="cancelPlacing()">Done</button>`;return;}
  if(pl.selectedId){
    const it=itemById(pl.selectedId);const circ=it&&it.circuit_id?S.circuits.find(c=>c.id===it.circuit_id):null;
    bar.innerHTML=`<button class="icon-tool" onclick="openLinkCircuit()">🔌 ${circ?'C'+esc(circ.number):'Circuit'}</button>`+
      (it&&isSwitchType(it.icon_type)?'':`<button class="icon-tool" onclick="openLinkSwitch()">🔀 Switched by</button>`)+
      `<button class="icon-tool" onclick="duplicateSelected()">⧉ Copy</button>`+
      `<button class="icon-tool danger" onclick="deleteSelected()">🗑 Delete</button>`+
      `<span class="nudge-pad"><button class="icon-tool nb" onclick="nudgeBtn(-1,0)">◀</button><button class="icon-tool nb" onclick="nudgeBtn(0,-1)">▲</button><button class="icon-tool nb" onclick="nudgeBtn(0,1)">▼</button><button class="icon-tool nb" onclick="nudgeBtn(1,0)">▶</button></span>`+
      `<button class="ghost-btn" style="margin-left:auto" onclick="deselect()">Done</button>`;
    return;
  }
  bar.innerHTML=`<button class="add-btn" onclick="openPalette()">＋ Add fitting</button><button class="icon-tool" onclick="startWalls()">🧱 Walls</button><button class="ghost-btn" style="margin-left:auto" onclick="exitPlanEdit()">Done</button>`;
}
function enterPlanEdit(){requirePin(()=>{S.plan.editMode=true;renderPlanActions();renderPlan();showToast('Editing — tap ＋ Add fitting');});}
function exitPlanEdit(){S.plan.editMode=false;S.plan.selectedId=null;S.plan.placingType=null;S.plan.placeCount=0;S.plan.placingCircuit=null;S.plan.tool='select';S.plan.wallDraft=null;renderPlanActions();renderPlan();}
function deselect(){S.plan.selectedId=null;S.plan.hoverId=null;renderPlan();renderPlanActions();}
function cancelPlacing(){S.plan.placingType=null;S.plan.placeCount=0;S.plan.placingCircuit=null;renderPlanActions();}

// ── Modals ──
function showModal(body){closeAnyModal();const o=document.createElement('div');o.className='modal-overlay';o.onclick=e=>{if(e.target===o)o.remove();};o.innerHTML=`<div class="modal-box">${body}</div>`;document.getElementById('app').appendChild(o);return o;}
function closeAnyModal(){document.querySelector('.modal-overlay')?.remove();}
function requirePin(onOk){
  if(S.readOnly){promptLogin();return;}
  if(S.currentUser){onOk();return;}
  promptLogin();
}
function openPalette(){
  let body=`<div class="modal-title">Add a fitting</div>`;
  CAT_ORDER.forEach(cat=>{
    const keys=Object.keys(ICON_META).filter(k=>ICON_META[k].cat===cat);if(!keys.length)return;
    body+=`<div class="pal-cat ${cat}">${esc(CAT_NAME[cat])}</div><div class="palette-grid">`;
    keys.forEach(k=>{body+=`<div class="pal-item" onclick="pickIcon('${k}')">${ICONS[k]}<div class="pal-name">${esc(ICON_META[k].name)}</div></div>`;});
    body+=`</div>`;
  });
  body+=`<button class="cancel-btn" onclick="closeAnyModal()">Close</button>`;
  showModal(body);
}
function pickIcon(k){closeAnyModal();if(isGpoType(k)){openGpoCircuitPicker(k);return;}if(EMERG.has(k)){const ec=findEmergencyCircuit();if(ec){startGpoPlacement(k,ec.id);return;}openGpoCircuitPicker(k);return;}S.plan.placingType=k;S.plan.placingCircuit=null;S.plan.placeCount=0;S.plan.tool='select';renderPlanActions();showToast('Tap the plan to place');}
function openGpoCircuitPicker(k){
  if(!S.circuits.length){showToast('Add circuits to this board first');return;}
  let body=`<div class="modal-title">${esc(ICON_META[k]?ICON_META[k].name:k)} — which circuit?</div><p style="font-size:12px;color:#888;margin-bottom:10px;line-height:1.5">Pick the circuit these outlets are on. Each one you place links to it and joins the dotted circuit run.</p><div style="max-height:50vh;overflow:auto">`;
  S.circuits.slice().sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0)).forEach(c=>{body+=`<div onclick="startGpoPlacement('${k}','${c.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid #eee;border-radius:8px;margin-bottom:6px;cursor:pointer"><div style="width:30px;height:30px;border-radius:7px;background:#0d1b2e;color:#f0a500;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${esc(c.number)}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${esc(c.label||'Unlabelled')}</div><div style="font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.device_type||'—')}</div></div></div>`;});
  body+=`</div><button class="cancel-btn" onclick="closeAnyModal()">Cancel</button>`;
  showModal(body);
}
function startGpoPlacement(k,cid){closeAnyModal();S.plan.placingType=k;S.plan.placingCircuit=cid;S.plan.placeCount=0;S.plan.tool='select';renderPlanActions();const c=S.circuits.find(x=>x.id===cid);showToast('Placing on C'+(c?c.number:'')+' — tap to drop');}
function openLinkCircuit(){
  const it=itemById(S.plan.selectedId);if(!it)return;
  let body=`<div class="modal-title">Link to a circuit</div><p style="font-size:12px;color:#888;margin-bottom:10px;line-height:1.5">Links this fitting to a circuit — used by the circuit filter and by tap-to-open in view mode.</p><div style="max-height:50vh;overflow:auto">`;
  if(!S.circuits.length)body+=`<div style="color:#aaa;font-size:13px;padding:16px;text-align:center">No circuits on this board yet</div>`;
  S.circuits.slice().sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0)).forEach(c=>{
    const sel=it.circuit_id===c.id;
    body+=`<div onclick="setItemCircuit('${c.id}')" style="display:flex;align-items:center;gap:10px;padding:9px 10px;border:1px solid ${sel?'#378ADD':'#eee'};background:${sel?'#E6F1FB':'#fff'};border-radius:8px;margin-bottom:6px;cursor:pointer"><div style="width:30px;height:30px;border-radius:7px;background:#0d1b2e;color:#f0a500;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">${esc(c.number)}</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">${esc(c.label||'Unlabelled')}</div><div style="font-size:11px;color:#888;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(c.device_type||'—')}</div></div>${sel?'<span style="color:#378ADD;font-weight:700">✓</span>':''}</div>`;
  });
  body+=`</div>`;
  if(it.circuit_id)body+=`<button class="ghost-btn" style="width:100%;margin-top:6px" onclick="setItemCircuit(null)">Unlink circuit</button>`;
  body+=`<button class="cancel-btn" onclick="closeAnyModal()">Close</button>`;
  showModal(body);
}
function openLinkSwitch(){
  const it=itemById(S.plan.selectedId);if(!it)return;
  const switches=S.plan.items.filter(x=>x.id!==it.id&&isSwitchType(x.icon_type));
  let body=`<div class="modal-title">Switched by…</div><p style="font-size:12px;color:#888;margin-bottom:10px;line-height:1.5">Pick the switch that controls this fitting. Hovering the fitting draws a dotted loop to it. Place the switch on the plan first.</p>`;
  if(!switches.length){body+=`<div style="color:#aaa;font-size:13px;padding:14px;text-align:center">No switches placed on this plan yet.</div>`;}
  else{
    body+=`<div style="max-height:46vh;overflow:auto">`;
    switches.forEach(sw=>{
      const sel=it.switch_plate_id===sw.id;const gc=sw.gang_number||gangCount(sw.icon_type);
      let gangPick='';
      if(gc>1){gangPick=`<div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap">`+Array.from({length:gc},(_,i)=>`<span onclick="event.stopPropagation();setItemSwitch('${sw.id}',${i+1})" style="padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;border:1px solid ${sel&&it.gang_index===i+1?'#378ADD':'#ddd'};background:${sel&&it.gang_index===i+1?'#E6F1FB':'#f5f5f5'}">Gang ${i+1}</span>`).join('')+`</div>`;}
      body+=`<div onclick="setItemSwitch('${sw.id}',1)" style="padding:9px 10px;border:1px solid ${sel?'#378ADD':'#eee'};background:${sel?'#E6F1FB':'#fff'};border-radius:8px;margin-bottom:6px;cursor:pointer"><div style="font-size:13px;font-weight:600">${esc(ICON_META[sw.icon_type]?ICON_META[sw.icon_type].name:sw.icon_type)}${sel&&it.gang_index?' · Gang '+it.gang_index:''}</div>${gangPick}</div>`;
    });
    body+=`</div>`;
  }
  if(it.switch_plate_id)body+=`<button class="ghost-btn" style="width:100%;margin-top:6px" onclick="setItemSwitch(null,null)">Remove loop</button>`;
  body+=`<button class="cancel-btn" onclick="closeAnyModal()">Close</button>`;
  showModal(body);
}

// ── Add plan (Supabase Storage upload) ──
function downscaleImage(file,maxDim,quality){
  return new Promise((resolve,reject)=>{
    const fr=new FileReader();
    fr.onload=()=>{const img=new Image();img.onload=()=>{let w=img.width,h=img.height;if(w>maxDim||h>maxDim){const r=Math.min(maxDim/w,maxDim/h);w=Math.round(w*r);h=Math.round(h*r);}const cv=document.createElement('canvas');cv.width=w;cv.height=h;const ctx=cv.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,w,h);ctx.drawImage(img,0,0,w,h);cv.toBlob(b=>resolve({blob:b,w,h}),'image/jpeg',quality);};img.onerror=reject;img.src=fr.result;};
    fr.onerror=reject;fr.readAsDataURL(file);
  });
}
async function uploadPlanImage(file){
  const ds=await downscaleImage(file,1600,0.78);
  const path=`${S.selectedBoard.id}/${Date.now()}-${Math.random().toString(36).slice(2,8)}.jpg`;
  const r=await fetch(`${DB_URL}/storage/v1/object/floor-plans/${path}`,{method:'POST',headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()||DB_KEY}`,'Content-Type':'image/jpeg','x-upsert':'true'},body:ds.blob});
  if(!r.ok)throw new Error(await r.text());
  return {url:`${DB_URL}/storage/v1/object/public/floor-plans/${path}`,w:ds.w,h:ds.h};
}
function openAddPlan(){
  requirePin(()=>{
    const o=showModal(`<div class="modal-title">Add floor plan</div><label class="field-label">Plan name</label><input class="field-input" id="np-name" placeholder="e.g. Ground floor"><label class="field-label">Plan image (photo or scan)</label><input class="field-input" id="np-file" type="file" accept="image/*" style="padding:7px"><div id="np-preview" style="margin:6px 0 10px;text-align:center"></div><div class="err-msg" id="np-err"></div><button class="primary-btn" id="np-save">Create floor plan</button><button class="cancel-btn" onclick="closeAnyModal()">Cancel</button>`);
    let theFile=null;
    const fileEl=document.getElementById('np-file');
    fileEl.onchange=()=>{const f=fileEl.files[0];if(!f)return;theFile=f;const rd=new FileReader();rd.onload=()=>{document.getElementById('np-preview').innerHTML=`<img src="${rd.result}" style="max-width:100%;max-height:170px;border-radius:6px;border:1px solid #eee">`;};rd.readAsDataURL(f);};
    document.getElementById('np-save').onclick=async()=>{
      const er=document.getElementById('np-err');const name=(document.getElementById('np-name').value||'').trim()||'Floor plan';
      if(!theFile){er.style.display='block';er.textContent='Please choose a plan image first.';return;}
      const btn=document.getElementById('np-save');btn.disabled=true;btn.textContent='Uploading…';
      try{
        const up=await uploadPlanImage(theFile);
        const res=await sb('floor_plans',{method:'POST',body:JSON.stringify({board_id:S.selectedBoard.id,name,image_url:up.url,width:up.w,height:up.h})});
        const np=Array.isArray(res)?res[0]:res;
        S.plan.plans.push(np);S.plan.current=np;S.plan.items=[];S.plan.walls=[];S.plan.loaded=true;S.plan.selectedId=null;S.plan.placingType=null;
        o.remove();draw();showToast('✓ Floor plan added');
      }catch(e){btn.disabled=false;btn.textContent='Create floor plan';er.style.display='block';er.textContent='Failed: '+e.message;}
    };
  });
}

boot();
</script>
<script>
/* PWA: service worker + install prompt (V3.18) */
(function(){
  if('serviceWorker' in navigator){
    var hadController=!!navigator.serviceWorker.controller, refreshing=false;
    navigator.serviceWorker.addEventListener('controllerchange',function(){if(hadController&&!refreshing){refreshing=true;window.location.reload();}});
    window.addEventListener('load',function(){navigator.serviceWorker.register('./sw.js').then(function(reg){if(reg&&reg.update)reg.update();}).catch(function(e){console.warn('SW registration failed',e);});});
  }
  var deferred=null;
  var bar=document.createElement('div');
  bar.id='pwa-install';
  bar.style.cssText='display:none;position:fixed;left:50%;bottom:calc(env(safe-area-inset-bottom, 0px) + 14px);transform:translateX(-50%);z-index:1000;background:#0d1b2e;color:#fff;border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:9px 10px 9px 14px;align-items:center;gap:10px;box-shadow:0 6px 24px rgba(0,0,0,.35);font-family:system-ui,-apple-system,sans-serif;max-width:92vw';
  function show(){bar.style.display='flex';}
  function hide(){bar.style.display='none';}
  function mount(){if(!bar.parentNode&&document.body)document.body.appendChild(bar);}
  document.addEventListener('DOMContentLoaded',mount);mount();
  window.addEventListener('beforeinstallprompt',function(e){
    e.preventDefault();deferred=e;
    if(localStorage.getItem('sbl_install_dismissed'))return;
    bar.innerHTML='<span style="font-size:13px;line-height:1.3">Install for offline use on site</span><button id="pwa-add" style="background:#f0a500;color:#0d1b2e;border:none;border-radius:8px;padding:8px 13px;font-weight:700;font-size:13px;font-family:inherit">Install</button><button id="pwa-x" style="background:transparent;color:rgba(255,255,255,.55);border:none;font-size:20px;line-height:1;padding:0 4px">\u00d7</button>';
    bar.querySelector('#pwa-add').onclick=function(){hide();if(deferred){deferred.prompt();deferred.userChoice.finally(function(){deferred=null;});}};
    bar.querySelector('#pwa-x').onclick=function(){hide();localStorage.setItem('sbl_install_dismissed','1');};
    mount();show();
  });
  window.addEventListener('appinstalled',function(){hide();localStorage.setItem('sbl_install_dismissed','1');});
  var isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent)&&!window.MSStream;
  var standalone=(window.matchMedia&&window.matchMedia('(display-mode: standalone)').matches)||navigator.standalone;
  if(isIOS&&!standalone&&!localStorage.getItem('sbl_ios_hint')){
    bar.innerHTML='<span style="font-size:13px;line-height:1.3">Install: tap Share, then \u201cAdd to Home Screen\u201d</span><button id="pwa-x" style="background:transparent;color:rgba(255,255,255,.55);border:none;font-size:20px;line-height:1;padding:0 4px">\u00d7</button>';
    bar.querySelector('#pwa-x').onclick=function(){hide();localStorage.setItem('sbl_ios_hint','1');};
    setTimeout(function(){mount();show();},1800);
  }
})();
</script>
