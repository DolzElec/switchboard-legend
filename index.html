<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Switchboard Legend — DolzElec</title>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0d1b2e">
<link rel="apple-touch-icon" href="./icon-192.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Switchboard">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Barlow Condensed','Barlow',system-ui,sans-serif;background:#e8e8e8;min-height:100vh;display:flex;justify-content:center}
#app{width:100%;max-width:480px;min-height:100vh;display:flex;flex-direction:column;background:#f5f5f5;position:relative}
@media (orientation:landscape){#app{max-width:100%}}
.topbar{background:#0d1b2e;padding:calc(env(safe-area-inset-top,0px) + 14px) 16px 10px;flex-shrink:0}
.topbar-label{font-size:10px;font-weight:500;color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase}
.topbar-title{font-size:20px;font-weight:700;color:#fff;margin-top:2px}
.topbar-sub{font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px}
.back-btn{display:flex;align-items:center;gap:5px;font-size:13px;color:#f0a500;background:none;border:none;font-family:inherit;font-weight:600;padding:10px 16px 4px;cursor:pointer}
.nav-tabs{display:flex;border-bottom:0.5px solid rgba(255,255,255,0.15);background:#0d1b2e}
.nav-tab{flex:1;padding:9px 4px;font-size:11px;font-weight:600;text-align:center;cursor:pointer;border-bottom:2px solid transparent;color:rgba(255,255,255,0.45);letter-spacing:0.3px;transition:all 0.12s}
.nav-tab.active{color:#f0a500;border-bottom-color:#f0a500}
.scroll{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.section-label{font-size:10px;font-weight:600;color:#999;letter-spacing:0.8px;text-transform:uppercase;margin:10px 0 6px}
.card{background:#fff;border:0.5px solid #e8e8e8;border-radius:10px;padding:10px 12px;margin-bottom:8px}

/* ── Switchboard grid layout ── */
.sb-grid{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:6px;padding:10px 10px 16px}
.sb-col{display:flex;flex-direction:column;gap:4px;min-width:0}
.sb-grid-h{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:6px;padding:10px 10px 16px;align-items:start}
.sb-col-label{font-size:9px;font-weight:700;color:#999;letter-spacing:1px;text-transform:uppercase;text-align:center;padding:4px 0 2px}
.rotate-hint{display:none;align-items:center;justify-content:center;gap:7px;font-size:12px;color:#7a5c00;background:#fff8e6;border:0.5px solid #f0d896;border-radius:8px;padding:8px 12px;margin:8px 10px 0}
@media (orientation:portrait){.rotate-hint{display:flex}}
.circuit-card{display:flex;align-items:center;gap:0;border-radius:8px;overflow:hidden;cursor:pointer;border:1px solid #e0e0e0;background:#fff;transition:all 0.1s;height:54px}
.circuit-card:active{transform:scale(0.98);opacity:0.9}
.circuit-card.isolated{border-color:#A32D2D!important;background:repeating-linear-gradient(45deg,#fff,#fff 6px,#fbe3e3 6px,#fbe3e3 12px)}
.iso-badge{background:#A32D2D;color:#fff;font-size:8px;font-weight:800;padding:2px 5px;border-radius:9px;flex-shrink:0;margin-right:6px;letter-spacing:0.3px;white-space:nowrap}
.iso-banner{background:#FCEBEB;border:1px solid #A32D2D;border-left-width:4px;border-radius:8px;padding:11px 13px;margin-bottom:10px}
.iso-banner-t{font-size:13px;font-weight:800;color:#A32D2D;letter-spacing:0.3px}
.iso-banner-s{font-size:12px;color:#7a2222;margin-top:3px;line-height:1.4}
.supply-card{background:#fff;border:1px solid #e6e6e6;border-radius:10px;padding:9px 12px;margin-bottom:10px}
.supply-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.supply-title{font-size:11px;font-weight:700;color:#0d1b2e;letter-spacing:0.3px}
.supply-edit{background:transparent;border:none;color:#2980b9;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;padding:2px 4px}
.supply-rows{display:flex;flex-wrap:wrap;gap:7px 18px}
.supply-l{font-size:9px;color:#999;text-transform:uppercase;letter-spacing:0.4px}
.supply-v{font-size:13px;font-weight:600;color:#111;margin-top:1px}
.seg{display:flex;gap:6px;margin-bottom:12px}
.seg-btn{flex:1;padding:9px;border:1px solid #d8d8d8;background:#fff;border-radius:8px;font-family:inherit;font-size:12px;font-weight:600;color:#666;cursor:pointer}
.seg-btn.on{background:#0d1b2e;color:#fff;border-color:#0d1b2e}
.rcd-list{display:flex;flex-direction:column;gap:6px}
.rcd-row{display:flex;align-items:center;gap:8px;padding:8px;border:1px solid #ececec;border-radius:8px;cursor:pointer;background:#fff}
.rcd-row:active{background:#f6f6f6}
.rcd-row-main{flex:1;min-width:0}
.rcd-row-name{font-size:13px;font-weight:700;color:#111}
.rcd-poles{font-size:10px;font-weight:700;color:#2980b9;margin-left:4px}
.rcd-row-sub{font-size:11px;color:#888;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rcd-chip{font-size:9px;font-weight:700;padding:2px 7px;border-radius:10px;flex-shrink:0;white-space:nowrap}
.phase-tab{width:10px;min-height:46px;flex-shrink:0;align-self:stretch}
.phase-R{background:#c0392b}
.phase-W{background:#bdc3c7}
.phase-B{background:#2980b9}
.phase-SP{background:#7f8c8d}
.circuit-card-inner{flex:1;padding:5px 8px;min-width:0;align-self:stretch;display:flex;flex-direction:column;justify-content:center}
.empty-slot-inner{flex:1;padding:5px 8px;min-width:0;align-self:stretch;display:flex;flex-direction:column;justify-content:center}
.circuit-card.spare{opacity:0.5;background:#f4f4f4;border-color:#d8d8d8;border-style:dashed}
.circuit-card.spare .circuit-card-label{color:#888;font-weight:500}
.circuit-card-num{font-size:10px;font-weight:700;color:#999;line-height:1}
.circuit-card-label{font-size:12px;font-weight:600;color:#111;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2}
.circuit-card-sub{font-size:10px;color:#aaa;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.circuit-card-chip{padding:2px 5px;border-radius:10px;font-size:9px;font-weight:700;flex-shrink:0;margin-right:6px;white-space:nowrap}
.chip-green{background:#EAF3DE;color:#3B6D11}
.chip-amber{background:#FAEEDA;color:#854F0B}
.chip-red{background:#FCEBEB;color:#A32D2D}
.empty-slot{display:flex;align-items:center;border-radius:8px;border:1px dashed #d0d0d0;background:#fafafa;height:54px;overflow:hidden;cursor:pointer;opacity:0.75;transition:all 0.1s}
.empty-slot:active{opacity:1;background:#f0f0f0}

/* ── Phase legend ── */
.phase-legend{display:flex;gap:10px;padding:8px 10px;background:#fff;border-radius:8px;margin:0 10px 6px;border:0.5px solid #eee}
.phase-legend-item{display:flex;align-items:center;gap:5px;font-size:10px;color:#666;font-weight:500}
.phase-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

/* ── Info rows ── */
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:0.5px solid #f0f0f0;gap:8px}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:#888;flex-shrink:0;padding-top:1px}
.info-val{font-size:12px;font-weight:600;color:#111;text-align:right}

/* ── Buttons ── */
.add-btn{background:#0d1b2e;color:#f0a500;border:none;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:5px;font-family:inherit}
.add-btn:active{opacity:0.8}
.add-btn:disabled{opacity:0.45;cursor:not-allowed}
.ghost-btn{background:transparent;color:#888;border:0.5px solid #ddd;border-radius:8px;padding:8px 14px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}
.test-row{display:flex;gap:6px;align-items:center;padding:7px 0;border-bottom:0.5px solid #f0f0f0;font-size:11px}
.test-row:last-child{border-bottom:none}

/* ── Modals ── */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;align-items:flex-end;justify-content:center;z-index:200}
.modal-box{background:#fff;border-radius:18px 18px 0 0;padding:20px 18px 36px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#111}
.field-label{font-size:10px;font-weight:600;color:#888;letter-spacing:0.5px;text-transform:uppercase;display:block;margin-bottom:4px;margin-top:2px}
.field-input{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;margin-bottom:10px;background:#fff;color:#111;-webkit-appearance:none;appearance:none}
.field-input:focus{outline:none;border-color:#378ADD;box-shadow:0 0 0 3px rgba(55,138,221,0.1)}
.field-textarea{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:9px 10px;font-size:14px;font-family:inherit;margin-bottom:10px;min-height:72px;resize:vertical;background:#fff;color:#111}
.field-textarea:focus{outline:none;border-color:#378ADD}
.primary-btn{width:100%;background:#0d1b2e;color:#f0a500;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.primary-btn:active{opacity:0.85}
.primary-btn:disabled{opacity:0.45;cursor:not-allowed}
.cancel-btn{width:100%;background:transparent;border:0.5px solid #ddd;border-radius:10px;padding:12px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;color:#555}
.bottombar{background:#0d1b2e;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.center-msg{display:flex;align-items:center;justify-content:center;flex:1;padding:60px 20px;text-align:center;color:#aaa;font-size:14px;flex-direction:column;gap:12px}
.info-note{padding:10px 12px;background:#FAEEDA;border-radius:8px;font-size:12px;color:#854F0B;margin-bottom:12px;line-height:1.5}
.cat-chip{padding:5px 12px;border-radius:20px;font-size:11px;font-weight:500;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666;display:inline-block;margin:3px}
.cat-chip.sel{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.pri-opt{flex:1;padding:8px;border-radius:8px;font-size:12px;font-weight:500;text-align:center;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666}
.pri-opt.sel{background:#E6F1FB;color:#185FA5;border-color:#378ADD}
.supply-opt{flex:1;padding:10px 8px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;cursor:pointer;border:1.5px solid #ddd;background:#f5f5f5;color:#666}
.supply-opt.sel{background:#0d1b2e;color:#f0a500;border-color:#0d1b2e}
.pin-input{width:100%;border:0.5px solid #ddd;border-radius:8px;padding:10px;font-size:26px;letter-spacing:10px;text-align:center;font-family:monospace;margin-bottom:10px;background:#fff;color:#111}
.pin-input:focus{outline:none;border-color:#378ADD}
.err-msg{font-size:12px;color:#A32D2D;margin-bottom:10px;text-align:center;display:none}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#0d1b2e;color:#f0a500;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.qr-box{background:#f5f5f5;border-radius:10px;padding:12px;text-align:center;margin-top:8px;border:0.5px solid #e0e0e0}
.qr-url{font-size:11px;color:#378ADD;word-break:break-all;margin-top:6px;font-family:monospace}
@media(min-width:481px){#app{box-shadow:0 0 40px rgba(0,0,0,0.1)}}

/* ── Floor plan editor ── */
.plan-wrap{display:flex;flex-direction:column;flex:1;min-height:0;background:#dfe3e8}
.plan-bar{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff;border-bottom:0.5px solid #e3e3e3;overflow-x:auto;flex-shrink:0;-webkit-overflow-scrolling:touch}
.plan-chip{padding:5px 11px;border-radius:16px;font-size:11px;font-weight:600;white-space:nowrap;cursor:pointer;border:1px solid #ddd;background:#f5f5f5;color:#555;flex-shrink:0}
.plan-chip.sel{background:#0d1b2e;color:#f0a500;border-color:#0d1b2e}
.plan-filter{margin-left:auto;flex-shrink:0;font-size:11px;font-family:inherit;border:1px solid #ddd;border-radius:8px;padding:5px 8px;background:#fff;color:#333;max-width:150px}
.plan-stage{flex:1;overflow:auto;display:flex;align-items:flex-start;justify-content:center;padding:10px;-webkit-overflow-scrolling:touch;position:relative}
.plan-svg{width:100%;height:auto;display:block;background:#fff;border:1px solid #c4c9d0;border-radius:4px;box-shadow:0 1px 5px rgba(0,0,0,0.12);touch-action:none;user-select:none}
.plan-svg .pl-hit{cursor:pointer}
.plan-svg .pl-faded{opacity:0.18;transition:opacity .12s}
.plan-svg .handle{cursor:pointer}
.plan-actions{flex-shrink:0;background:#fff;border-top:0.5px solid #e3e3e3;padding:8px 10px;display:flex;align-items:center;gap:6px;min-height:52px;flex-wrap:wrap}
.plan-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#8a929b;padding:40px 24px;gap:12px}
.plan-hint{flex:1;font-size:11.5px;color:#0d1b2e;font-weight:600;line-height:1.3}
.icon-tool{background:#f5f5f5;border:0.5px solid #ddd;border-radius:8px;padding:7px 9px;font-size:11px;font-weight:600;color:#444;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px;line-height:1.1;min-height:40px}
.icon-tool:active{background:#ececec}
.icon-tool.danger{color:#A32D2D;background:#FCEBEB;border-color:#f3cccc}
.icon-tool.on{background:#0d1b2e;color:#f0a500;border-color:#0d1b2e}
.nudge-pad{display:inline-flex;gap:3px}
.icon-tool.nb{padding:7px 0;min-width:40px;justify-content:center;font-size:14px}
.palette-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:2px}
.pal-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 3px 6px;border:1px solid #eee;border-radius:10px;cursor:pointer;background:#fff;text-align:center}
.pal-item:active{background:#f3f3f3}
.pal-item svg{width:34px;height:34px;display:block}
.pal-name{font-size:9px;color:#666;line-height:1.15;font-weight:500;min-height:22px;display:flex;align-items:center}
.pal-cat{font-size:10px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;margin:14px 0 2px}
.pal-cat.lt{color:#b87c00}.pal-cat.em{color:#1D9E75}.pal-cat.sw{color:#378ADD}.pal-cat.hv{color:#0ea5b7}.pal-cat.pw{color:#c0392b}.pal-cat.brd{color:#1a1a1a}
.de-logo-wrap{display:flex;align-items:center;gap:12px;padding:10px 16px 8px}
.de-logo-img{height:42px;width:auto;flex-shrink:0}
.de-logo-text{display:flex;flex-direction:column;gap:0}
.de-logo-name{font-family:"Barlow Condensed","Barlow",sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,0.55);letter-spacing:1.5px;text-transform:uppercase;line-height:1}
.de-logo-app{font-family:"Barlow Condensed","Barlow",sans-serif;font-size:16px;font-weight:700;color:#ffffff;letter-spacing:0.3px;line-height:1.2;margin-top:2px}
.de-logo-sub{font-family:"Barlow Condensed","Barlow",sans-serif;font-size:11px;color:rgba(255,255,255,0.65);margin-top:1px;line-height:1}

.topbar-logo{display:flex;align-items:center;gap:10px;padding:10px 16px 8px}
.topbar-logo img{height:40px;width:auto;flex-shrink:0}
.topbar-logo-text{display:flex;flex-direction:column}
.topbar-logo-sub{font-size:10px;color:rgba(255,255,255,0.55);letter-spacing:1px;text-transform:uppercase;font-weight:500}
.topbar-logo-title{font-size:16px;font-weight:700;color:#fff;margin-top:1px}
.topbar-logo-loc{font-size:11px;color:rgba(255,255,255,0.7);margin-top:1px}
.rcd-overlay{position:fixed;inset:0;z-index:1200;background:#f5f5f5;display:flex;flex-direction:column;max-width:480px;margin:0 auto}
.rcd-head{background:#0d1b2e;color:#fff;padding:calc(env(safe-area-inset-top,0px) + 12px) 16px 12px;flex-shrink:0}
.rcd-title{font-size:18px;font-weight:700;color:#fff}
.rcd-sub{font-size:12px;color:rgba(255,255,255,0.7);margin-top:2px}
.rcd-progress{height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin-top:10px;overflow:hidden}
.rcd-progress>div{height:100%;background:#f0a500}
.rcd-body{flex:1;overflow-y:auto;padding:12px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 16px)}
.rcd-overlay .pri-opt{min-height:54px;display:flex;flex-direction:column;justify-content:center;line-height:1.25}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

// ── V4.1 (Step 2): real auth via Supabase GoTrue REST (no external library; works offline once loaded) ──
let _session=null;
const AUTH_KEY='sbl_auth_session';
function authToken(){return _session&&_session.access_token?_session.access_token:null;}
function hasSession(){return !!(_session&&_session.access_token);}
function _saveSession(s){_session=s;try{s?localStorage.setItem(AUTH_KEY,JSON.stringify(s)):localStorage.removeItem(AUTH_KEY);}catch(e){}}
function _loadSession(){try{const v=localStorage.getItem(AUTH_KEY);_session=v?JSON.parse(v):null;}catch(e){_session=null;}return _session;}
async function _goTrue(path,body){
  const r=await fetch(`${DB_URL}/auth/v1/${path}`,{method:'POST',headers:{apikey:DB_KEY,'Content-Type':'application/json'},body:JSON.stringify(body)});
  const t=await r.text();const j=t?JSON.parse(t):null;
  if(!r.ok)throw new Error((j&&(j.error_description||j.msg||j.error||j.message))||('Sign-in failed ('+r.status+')'));
  return j;
}
function _mkSession(j){return {access_token:j.access_token,refresh_token:j.refresh_token,expires_at:Date.now()+((j.expires_in||3600)*1000),user:j.user};}
async function signIn(email,password){const j=await _goTrue('token?grant_type=password',{email,password});_saveSession(_mkSession(j));return _session;}
async function refreshSession(){
  if(!_session||!_session.refresh_token)return null;
  try{const j=await _goTrue('token?grant_type=refresh_token',{refresh_token:_session.refresh_token});_saveSession(_mkSession(j));return _session;}
  catch(e){return null;}
}
async function ensureFreshToken(){if(!_session)return null;if(_session.expires_at&&Date.now()>_session.expires_at-60000)return await refreshSession();return _session;}
async function signOutAuth(){try{if(authToken())await fetch(`${DB_URL}/auth/v1/logout`,{method:'POST',headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()}`}});}catch(e){}_saveSession(null);}

// ── V4.7: invite / password-reset link handling ──
// Supabase invite + recovery emails land back here with the tokens in the URL hash.
function parseAuthHash(){
  const h=window.location.hash||'';
  if(h.length<2)return null;
  const p=new URLSearchParams(h.slice(1));
  const at=p.get('access_token');
  if(!at)return null;
  return {access_token:at,refresh_token:p.get('refresh_token')||null,type:p.get('type')||'',expires_in:parseInt(p.get('expires_in'))||3600};
}

  const r=await fetch(`${DB_URL}/auth/v1/user`,{method:'PUT',headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()}`,'Content-Type':'application/json'},body:JSON.stringify({password:pw})});
  const t=await r.text();const j=t?JSON.parse(t):null;

}

function clearCache(){try{Object.keys(localStorage).filter(k=>k.indexOf('sbl_cache_')===0).forEach(k=>localStorage.removeItem(k));}catch(e){}}

const sbFetch=async(path,opts={},_retry=true)=>{
  const isDelete=(opts&&opts.method)==='DELETE';
  const doFetch=()=>fetch(`${DB_URL}/rest/v1/${path}`,{
    headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()||DB_KEY}`,'Content-Type':'application/json',...(isDelete?{}:{Prefer:'return=representation'}),...(opts.headers||{})},
    ...opts
  });

  const t=await r.text();
  if(!r.ok){const err=new Error(t);err.http=true;throw err;}
  return t?JSON.parse(t):null;
};
const _isWrite=m=>m==='POST'||m==='PATCH'||m==='DELETE';
// ── Offline write queue (V3.20): writes go through here; when offline they queue + replay on reconnect ──
const sb=async(path,opts={})=>{
  const m=(opts&&opts.method)||'GET';
  // V4.0: block all writes in read-only (public QR) mode — backstop behind hidden UI + gates
  if(_isWrite(m)&&S.readOnly){promptLogin();return Promise.reject(new Error('read-only view'));}
  if(!_isWrite(m))return sbFetch(path,opts);
  if(typeof navigator!=='undefined'&&navigator.onLine===false)return queueWrite(path,opts,m);
  try{const res=await sbFetch(path,opts);flushQueue();return res;}
  catch(e){if(e&&e.http)throw e;return queueWrite(path,opts,m);}
};
function localRowMerge(path,patch){
  const table=path.split('?')[0];
  const mm=path.match(/id=eq\.([^&]+)/);
  const id=mm?decodeURIComponent(mm[1]):null;
  const map={circuits:S.circuits,rcd_tests:S.tests,users:S.users,boards:S.boards,sites:S.sites,rcds:S.rcds};
  const arr=map[table];
  if(arr&&id){const row=arr.find(r=>r&&r.id===id);if(row)return Object.assign({},row,patch);}
  return Object.assign({id:id},patch);
}
function queueWrite(path,opts,m){
  const body=(opts&&opts.body)?JSON.parse(opts.body):null;
  const localId=(m==='POST')?('local-'+Date.now().toString(36)+Math.random().toString(36).slice(2,6)):null;
  const q=cacheGet('queue')||[];
  q.push({path:path,method:m,body:(opts&&opts.body)||null,localId:localId,ts:Date.now()});
  cacheSet('queue',q);
  showOffline();
  if(S.selectedBoard){const bid=S.selectedBoard.id;setTimeout(function(){try{cacheSet('board_'+bid,{circuits:S.circuits,tests:S.tests,rcds:S.rcds});}catch(e){}},0);}
  if(m==='POST')return Promise.resolve([Object.assign({id:localId,created_at:new Date().toISOString(),_pending:true},body||{})]);

  return Promise.resolve(null);
}
let _flushing=false;
function remapLocalId(localId,realId){
  if(!localId||!realId||localId===realId)return;
  let q=cacheGet('queue')||[];
  q.forEach(function(it){if(it.path&&it.path.indexOf(localId)>=0)it.path=it.path.split(localId).join(realId);if(it.body&&it.body.indexOf(localId)>=0)it.body=it.body.split(localId).join(realId);if(it.localId===localId)it.localId=realId;});
  cacheSet('queue',q);
  [S.circuits,S.tests,S.users,S.boards,S.sites].forEach(function(arr){if(Array.isArray(arr))arr.forEach(function(r){if(r&&r.id===localId)r.id=realId;});});
  if(S.plan&&Array.isArray(S.plan.items))S.plan.items.forEach(function(r){if(r){if(r.id===localId)r.id=realId;if(r.switch_plate_id===localId)r.switch_plate_id=realId;}});
}
async function flushQueue(){
  if(_flushing||(typeof navigator!=='undefined'&&navigator.onLine===false))return;
  if(!(cacheGet('queue')||[]).length)return;
  _flushing=true;let synced=0;
  while(true){
    let q=cacheGet('queue')||[];
    if(!q.length)break;
    const it=q[0];
    try{
      const res=await sbFetch(it.path,{method:it.method,body:it.body});
      q=cacheGet('queue')||[];q.shift();cacheSet('queue',q);
      if(it.method==='POST'&&it.localId){const row=Array.isArray(res)?res[0]:res;if(row&&row.id)remapLocalId(it.localId,row.id);}
      synced++;
    }catch(e){
      if(e&&e.http){q=cacheGet('queue')||[];q.shift();cacheSet('queue',q);continue;}
      break;
    }
  }
  _flushing=false;
  if(synced){hideOffline();if(typeof showToast==='function')showToast('\u2713 Synced '+synced+' change'+(synced>1?'s':''));}
}
if(typeof window!=='undefined')window.addEventListener('online',function(){flushQueue();});

// Load one board with everything readable, via the public get_board_by_slug RPC.
// Returns a single JSON object {board, circuits, rcds, tests} — NOT an array; a
// missing slug returns null. Uses the anon key (sbFetch), no login required.
async function loadPublicBoard(slug){
  S.readOnly=true;
  S.customers=[];S.sites=[];S.boards=[];S.users=[];S.currentUser=null;S.selectedCustomer=null;S.selectedSite=null;
  S.plan={loaded:false,loading:false,plans:[],current:null,items:[],editMode:false,tool:'select',placingType:null,selectedId:null,filterCircuit:null,walls:[],wallDraft:null,hoverId:null,placeCount:0,view:null};
  set({view:'loading'});
  let data;
  try{
    data=await sbFetch('rpc/get_board_by_slug',{method:'POST',body:JSON.stringify({p_slug:slug})});
    if(data&&data.board)cacheSet('public_'+slug,data);
    hideOffline();
  }catch(e){
    const c=cacheGet('public_'+slug);
    if(c&&c.board){showOffline();applyPublicBoard(c);set({view:'board',tab:'board'});return;}
    set({view:'error',error:'Could not load this board.\n\n'+e.message});return;
  }
  if(!data||!data.board){
    set({view:'error',error:'This board could not be found.\n\nThe QR link may be out of date, or the board may have been removed.'});return;
  }
  applyPublicBoard(data);
  set({view:'board',tab:'board'});
}

}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function fmtDate(d){if(!d)return'—';try{return new Date(d).toLocaleDateString('en-AU');}catch(e){return String(d);}}

// ── Numbering scheme: number IS the physical slot, mapped across-then-down ──
// Vertical: 1=top-left, 2=top-right, 3=row2-left … (left col = odds, right col = evens).
// Horizontal: two rows — top row 1..half L→R, bottom row half+1..ways L→R.
function slotToCell(n,ways,orientation){
  const half=ways/2;n=parseInt(n);
  if(orientation==='horizontal')return (n<=half)?{row:1,col:n}:{row:2,col:n-half};
  return {row:Math.floor((n-1)/2)+1,col:((n-1)%2)+1};
}
// Phase follows physical position (a real busbar): vertical rotates R/W/B down each
// column; horizontal rotates along each row (2 rows make "down a column" degenerate).
function phaseForSlot(n,ways,orientation,supplyType){
  if(supplyType==='single_phase')return'SP';
  const cell=slotToCell(n,ways,orientation);
  const idx=(orientation==='horizontal')?(cell.col-1):(cell.row-1);
  return['R','W','B'][idx%3];
}
// Physically-adjacent higher slots a 3φ device at n may absorb, in span order.
// Vertical: down a column = step 2 (same parity). Horizontal: along a row, row-clamped.
function threePhaseNeighbors(n,ways,orientation){
  n=parseInt(n);const half=ways/2;
  if(orientation==='horizontal'){const end=(n<=half)?half:ways;return [n+1,n+2].filter(s=>s<=end);}
  return [n+2,n+4].filter(s=>s<=ways);
}

function phaseColor(ph){
  return{R:'#c0392b',W:'#9E9E9E',B:'#2980b9',SP:'#9E9E9E'}[ph]||'#ccc';
}

function statusColor(c){
  const si=circuitStatusInfo(c);
  if(si.key==='unprot')return null;
  if(si.key==='never'||si.key==='overdue')return'red';
  if(si.key==='due')return'amber';
  if(si.key==='ok')return'green';
  return null;
}

}
function rcdRunRender(){
  const r=S.rcdRun;if(!r){if(_rcdOverlay){_rcdOverlay.remove();_rcdOverlay=null;}return;}
  const o=ensureRcdOverlay();const board=S.selectedBoard||{};
  if(r.phase==='scope'){
    const all=rcdRunDevices(false).length,due=rcdRunDevices(true).length,cur=r.onlyDue?due:all;
    const today=new Date().toISOString().split('T')[0];
    o.innerHTML=`<div class="rcd-head"><button class="back-btn" style="padding:0 0 6px;color:#f0a500" onclick="rcdClose()">← Cancel</button><div class="rcd-title">⚡ Test all RCDs</div><div class="rcd-sub">${esc(board.name||'')}</div></div>
      <div class="rcd-body"><div class="section-label" style="margin-top:0">Which devices?</div>
        <div style="display:flex;gap:8px;margin-bottom:14px">
          <div class="pri-opt ${!r.onlyDue?'sel':''}" onclick="rcdSetScope(false)">All devices<br><span style="font-size:17px;font-weight:700">${all}</span></div>
          <div class="pri-opt ${r.onlyDue?'sel':''}" onclick="rcdSetScope(true)">Due / overdue<br><span style="font-size:17px;font-weight:700">${due}</span></div>
        </div>
        <div class="info-note" style="margin-bottom:14px">RCBOs + shared RCDs. Testing an RCD covers all its MCBs.</div>
        <label class="field-label">Test date</label>
        <input class="field-input" id="rr-date" type="date" value="${r.testDate||today}">
        <div class="info-note" style="margin-bottom:14px">Set an earlier date to record tests done before now.</div>
        <button class="primary-btn" ${cur?'':'disabled style="opacity:.5"'} onclick="rcdStartRun()">${cur?('Start testing '+cur+' device'+(cur>1?'s':'')+' →'):'Nothing to test'}</button>
        <button class="cancel-btn" onclick="rcdClose()">Cancel</button></div>`;
  } else if(r.phase==='step'){
    const dev=r.queue[r.idx],total=r.queue.length,pct=Math.round((r.idx/total)*100);const last=dev.last;
    o.innerHTML=`<div class="rcd-head"><button class="back-btn" style="padding:0 0 6px;color:#f0a500" onclick="rcdClose()">✕ Exit run</button><div class="rcd-title">Device ${r.idx+1} of ${total}</div><div class="rcd-progress"><div style="width:${pct}%"></div></div></div>
      <div class="rcd-body">
        <div class="card"><div style="font-size:17px;font-weight:700;color:#111">${esc(dev.title)}</div>
          <div style="font-size:12px;color:#888;margin-top:2px">${esc(dev.subtitle)}</div>
          <div style="font-size:11px;color:#aaa;margin-top:6px">Last test: ${last?fmtDate(last.test_date):'never'} · interval ${dev.interval} mo</div></div>
        <label class="field-label">Trip time (ms)</label>
        <input class="field-input" id="rr-ms" type="number" inputmode="decimal" placeholder="e.g. 18">
        <label class="field-label" style="margin-bottom:6px">Result</label>
        <div style="display:flex;gap:8px;margin-bottom:12px"><div class="pri-opt sel" id="rr-pass" onclick="rcdSetResult('pass')">✓ Pass</div><div class="pri-opt" id="rr-fail" onclick="rcdSetResult('fail')">✕ Fail</div></div>
        <label class="field-label">Note (optional)</label>
        <input class="field-input" id="rr-note" placeholder="Any observations…">
        <button class="primary-btn" onclick="rcdLogNext()">${r.idx+1>=total?'Log & finish':'Log & next →'}</button>
        <button class="ghost-btn" style="width:100%;margin-top:8px" onclick="rcdSkip()">Skip this one</button></div>`;
    setTimeout(function(){const el=document.getElementById('rr-ms');if(el)el.focus();},50);
  } else {
    const logged=r.results.filter(x=>x.result!=='skipped'),pass=logged.filter(x=>x.result==='pass').length,fail=logged.filter(x=>x.result==='fail').length,skip=r.results.filter(x=>x.result==='skipped').length;
    o.innerHTML=`<div class="rcd-head"><div class="rcd-title">✓ Run complete</div><div class="rcd-sub">${esc(board.name||'')}</div></div>
      <div class="rcd-body"><div class="card" style="text-align:center;padding:18px"><div style="font-size:15px;font-weight:700">${logged.length} tested</div><div style="font-size:13px;color:#555;margin-top:4px">${pass} passed${fail?' · '+fail+' failed':''}${skip?' · '+skip+' skipped':''}</div></div>
        <div class="section-label">Results</div>
        <div class="card">${r.results.map(function(x,i){return '<div class="info-row"'+(i===r.results.length-1?' style="border-bottom:none"':'')+'><span class="info-label">'+esc(x.tag)+'</span><span class="info-val" style="color:'+(x.result==='pass'?'#3B6D11':x.result==='fail'?'#A32D2D':'#999')+'">'+(x.result==='skipped'?'skipped':(x.result.toUpperCase()+(x.ms!=null?' · '+x.ms+'ms':'')))+'</span></div>';}).join('')}</div>
        <button class="primary-btn" onclick="rcdClose()">Done</button></div>`;
  }
}

function chipHtml(status){
  if(!status)return'';
  const m={green:['#EAF3DE','#3B6D11','OK'],amber:['#FAEEDA','#854F0B','Due'],red:['#FCEBEB','#A32D2D','OD']};
  const[bg,c,l]=m[status];
  return`<span class="circuit-card-chip" style="background:${bg};color:${c}">${l}</span>`;
}

function showToast(msg){
  const t=document.createElement('div');t.className='toast';t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),3000);
}

function boardURL(board){
  const base=window.location.origin+window.location.pathname;
  return`${base}?board=${board.qr_slug||board.id}`;
}

// ── Draw ──────────────────────────────────────────────────────────────────────
function draw(){
  const app=document.getElementById('app');if(!app)return;
  switch(S.view){
    case'loading':app.innerHTML=`<div class="center-msg"><div style="font-size:40px">⚡</div><div>Loading…</div></div>`;break;
    case'error':app.innerHTML=`<div class="center-msg"><div style="font-size:36px">⚠️</div><div style="color:#A32D2D;white-space:pre-wrap;font-size:13px">${esc(S.error)}</div><button class="add-btn" style="margin-top:12px" onclick="init()">Retry</button></div>`;break;
    case'login':drawLogin(app);break;
    case'setpw':drawSetPassword(app);break;
    case'customers':drawCustomers(app);break;
    case'sites':drawSites(app);break;
    case'boards':drawSiteBoards(app);break;
    case'board':drawBoard(app);break;
    case'circuit':drawCircuit(app);break;
    case'admin':drawAdmin(app);break;
  }
  if(S.modal)setTimeout(drawModal,10);
}

function drawCustomers(app){
  let h=`<div class="topbar">
    <div class="de-logo-wrap">
      <img class="de-logo-img" src="${LOGO_URI}" alt="DolzElec">
      <div class="de-logo-text">

      <div style="flex:1;min-width:0"><div style="font-size:14px;font-weight:600">${esc(cust.name)}</div>
      <div style="font-size:11px;color:#888;margin-top:1px">${cust.contact_name?esc(cust.contact_name)+' · ':''}${n} site${n===1?'':'s'}</div></div>

      <div style="width:40px;height:40px;border-radius:8px;background:#e0e0e0;color:#999;font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">?</div>

function selCustomer(id){

}

  let h=`<div style="background:#0d1b2e;flex-shrink:0;padding-top:env(safe-area-inset-top,0px)">

function selSite(id){

  h+=`</div>`;
  app.innerHTML=h;
}

function selBoard(bId,sId){
  S.selectedBoard=S.boards.find(b=>b.id===bId);
  S.selectedSite=S.sites.find(s=>s.id===sId)||null;

  if(hasSession())S.readOnly=!canEditSite((S.selectedBoard&&S.selectedBoard.site_id)||sId);
  loadBoard(S.selectedBoard);
}

function reportStatusLabel(k){return k==='never'?'Never tested':k==='overdue'?'Overdue':k==='due'?'Due soon':'Current';}
function reportStatusColor(k){return k==='ok'?'#2e7d32':k==='due'?'#854F0B':'#A32D2D';}
function genReportData(){
  const rows=[];
  (S.rcds||[]).slice().sort((a,b)=>String(a.name||'').localeCompare(String(b.name||''))).forEach(function(r){
    const si=statusFromTest(rcdLastTest(r.id),r.test_interval_months||6);
    const prot=circuitsUnderRcd(r.id).map(c=>c.number);
    rows.push({kind:'RCD',ident:(r.name||'RCD'),desc:'RCD '+rcdPolesLabel(r.poles)+(prot.length?' \u2014 protects '+prot.join(', '):' \u2014 no circuits'),deviceLabel:(r.rating||rcdPolesLabel(r.poles)),last:si.last,next:si.due,status:reportStatusLabel(si.key),sc:reportStatusColor(si.key)});
  });
  S.circuits.filter(c=>isRcbo(c)).slice().sort((a,b)=>(parseInt(a.number)||0)-(parseInt(b.number)||0)).forEach(function(c){
    const last=S.tests.filter(t=>t.circuit_id===c.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date))[0]||null;
    const si=statusFromTest(last,c.test_interval_months||6);
    rows.push({kind:'RCBO',ident:'C'+(c.number||''),desc:(c.label||'Unlabelled'),deviceLabel:devTypeString(c)+(c.device_rating?' '+c.device_rating:''),last:last,next:si.due,status:reportStatusLabel(si.key),sc:reportStatusColor(si.key)});
  });
  return rows;
}
function buildRcdReport(){
  const b=S.selectedBoard;if(!b){showToast('Open a board first');return null;}
  const site=S.selectedSite||S.sites.find(s=>s.id===b.site_id)||{};
  const rows=genReportData();
  if(!rows.length){showToast('No RCDs or RCBOs on this board');return null;}
  const now=new Date();
  const gen=now.toLocaleString('en-AU',{day:'numeric',month:'long',year:'numeric',hour:'numeric',minute:'2-digit'});
  const dstr=now.toISOString().slice(0,10);
  const cnt={Current:0,'Due soon':0,Overdue:0,'Never tested':0};
  rows.forEach(r=>cnt[r.status]++);
  const meta=[];
  meta.push(['Site',esc(site.name||'—')]);
  meta.push(['Board',esc(b.name||'—')]);
  if(b.location)meta.push(['Location',esc(b.location)]);
  meta.push(['Supply',({single_phase:'Single phase',three_phase:'Three phase'})[b.supply_type]||'—']);
  if(b.fed_from)meta.push(['Fed from',esc(b.fed_from)]);
  if(b.main_switch_rating)meta.push(['Main switch',esc(b.main_switch_rating)]);
  if(b.metering_nmi)meta.push(['NMI',esc(b.metering_nmi)]);
  meta.push(['Generated',esc(gen)]);

function hexToRgb(hex){const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(String(hex||''));return m?[parseInt(m[1],16),parseInt(m[2],16),parseInt(m[3],16)]:null;}
// Lazy-load jsPDF + autotable only when a report is emailed. Vector output (crisp, never blank).
function loadJsPdf(){
  return new Promise(function(resolve,reject){
    if(window.jspdf&&window.jspdf.jsPDF&&window.jspdf.jsPDF.API&&window.jspdf.jsPDF.API.autoTable)return resolve(window.jspdf);
    const add=function(src,next){const s=document.createElement('script');s.src=src;s.onload=next;s.onerror=function(){reject(new Error('Could not load the PDF library (are you online?)'));};document.head.appendChild(s);};
    const done=function(){(window.jspdf&&window.jspdf.jsPDF&&window.jspdf.jsPDF.API.autoTable)?resolve(window.jspdf):reject(new Error('PDF library failed to load'));};
    if(window.jspdf&&window.jspdf.jsPDF){add('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',done);}
    else{add('https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js',function(){add('https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js',done);});}
  });
}

// ── Printable circuit legend (hardcopy for the physical board) ─────────────────
// One row per way, in slot order, with a blank "As labelled on board" column so
// the sparky can hand-write the board's own numbering where it differs from ours.
function buildLegend(){
  const b=S.selectedBoard;if(!b){showToast('Open a board first');return null;}
  const site=S.selectedSite||S.sites.find(s=>s.id===b.site_id)||{};
  const ways=b.ways||24;
  const isThreePhase=b.supply_type!=='single_phase';
  const bySlot={};
  S.circuits.forEach(c=>{const n=parseInt(c.number);if(!isNaN(n))bySlot[n]=c;});
  // Work out which ways a 3φ circuit spans, so covered ways read "part of C…".
  const half=Math.ceil(ways/2);
  const horizontal=b.orientation==='horizontal';
  const hidden={},spanOf={};
  S.circuits.forEach(c=>{
    if(!dev3ph(c))return;
    const n=parseInt(c.number);if(isNaN(n))return;
    let span=1;
    for(const s of threePhaseNeighbors(n,ways,b.orientation)){
      if(!bySlot[s]){hidden[s]=n;span++;}else break;
    }
    spanOf[n]=span;
  });
  const now=new Date();
  const gen=now.toLocaleString('en-AU',{day:'numeric',month:'long',year:'numeric',hour:'numeric',minute:'2-digit'});
  const dstr=now.toISOString().slice(0,10);
  const meta=[];
  meta.push(['Site',esc(site.name||'—')]);
  meta.push(['Board',esc(b.name||'—')]);
  if(b.location)meta.push(['Location',esc(b.location)]);
  meta.push(['Supply',isThreePhase?'Three phase':'Single phase']);
  meta.push(['Ways',esc(String(ways))]);
  if(b.fed_from)meta.push(['Fed from',esc(b.fed_from)]);
  if(b.main_switch_rating)meta.push(['Main switch',esc(b.main_switch_rating)]);
  meta.push(['Printed',esc(gen)]);
  const metaRows=meta.map(m=>`<tr><td class="ml">${m[0]}</td><td class="mv">${m[1]}</td></tr>`).join('');
  // Render one side's cells for a print row. A 3φ head emits a single description
  // cell that spans (rowspan) its 2–3 badges, so the breaker is labelled ACROSS all
  // its circuit badges; the covered slots below emit only their number + phase dot.
  // `cover.rem` carries the rowspan coverage down this column between rows.
  function cells(i,edge,cover){
    const rgt=edge?' rgt':'';
    const blank=(i==null||i<1||i>ways);
    const num=blank?`<td class="cnum blank${rgt}"></td>`:`<td class="cnum${rgt}">${i}</td>`;
    const ph=isThreePhase?(blank?'<td class="ph"></td>':`<td class="ph"><span class="dot" style="background:${phaseColor(phaseForSlot(i,b.ways,b.orientation,b.supply_type))}"></span></td>`):'';
    const numPh=num+ph;
    if(cover.rem>0){cover.rem--;return numPh;}            // description supplied by a rowspan above
    if(blank)return numPh+'<td class="desc"></td>';
    const c=bySlot[i];
    if(c&&dev3ph(c)&&(spanOf[i]||1)>1){
      cover.rem=spanOf[i]-1;
      const label=esc(c.label||'Unlabelled');
      const type=esc(devTypeString(c))+(c.device_rating?' · '+esc(c.device_rating):'');
      return numPh+`<td class="desc span3" rowspan="${spanOf[i]}">${label}<div class="sub">${type}</div></td>`;
    }
    if(!c)return numPh+'<td class="desc"><span class="muted">Spare / not used</span></td>';
    if(isSpare(c))return numPh+'<td class="desc"><span class="spare">SPARE</span></td>';
    const label=esc(c.label||'Unlabelled');
    const type=esc(devTypeString(c))+(c.device_rating?' · '+esc(c.device_rating):'');
    return numPh+`<td class="desc">${label}<div class="sub">${type}</div></td>`;
  }
  // Two columns side by side, mimicking the board, with a blank "As labelled"
  // write-in strip on the OUTER edge of each column. Pairing follows orientation:
  //   vertical   → across then down: row r = left 2r-1 (odd), right 2r (even)
  //   horizontal → the board's two rows: left = top row r, right = bottom row half+r
  const coverL={rem:0},coverR={rem:0};
  let body='';
  for(let r=1;r<=half;r++){
    const L=horizontal?r:(2*r-1);
    const R=horizontal?(half+r):(2*r);
    body+=`<tr><td class="write"></td>${cells(L,false,coverL)}${cells(R,true,coverR)}<td class="write"></td></tr>`;
  }
  const phHead=isThreePhase?'<th class="ph">Ph</th>':'';
  const title='DolzElec Switchboard Legend - '+(b.name||'Board')+' - '+dstr;
  const css='@page{size:A4;margin:12mm}*{box-sizing:border-box;-webkit-print-color-adjust:exact;print-color-adjust:exact}body{font-family:Arial,Helvetica,sans-serif;color:#111;margin:0}'
    +'.hdr{background:#0d1b2e;padding:14px 22px;display:flex;justify-content:space-between;align-items:center}'
    +'.rlogo{height:50px;width:auto;display:block}'
    +'.brandwrap{display:flex;align-items:center;gap:12px}'
    +'.brand{font-size:24px;font-weight:800;color:#f0a500;letter-spacing:2px}'
    +'.htitle{font-size:13px;color:#fff;font-weight:600;text-align:right}'
    +'.wrap{padding:12px 16px}'
    +'.sheet-wrap{overflow:hidden}.sheet-scale{transform-origin:top left}'
    +'.mtab{border-collapse:collapse;margin-bottom:8px}.mtab td{padding:1px 0;font-size:11px;vertical-align:top}'
    +'.ml{color:#888;padding-right:14px!important;white-space:nowrap}.mv{font-weight:600}'
    +'table.leg{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}'
    +'table.leg thead{display:table-header-group}'
    +'table.leg th{background:#0d1b2e;color:#fff;text-align:left;padding:5px 6px;font-size:9px;text-transform:uppercase;letter-spacing:0.3px}'
    +'table.leg td{padding:4px 6px;border-bottom:1px solid #ccc;vertical-align:middle;overflow-wrap:break-word;word-wrap:break-word}'
    +'table.leg tr{page-break-inside:avoid}'
    +'th.write{width:13%}th.cnum{width:5%}th.ph{width:4%}'
    +'td.cnum{font-weight:700;text-align:center;background:#f4f4f4}td.cnum.blank{background:#fff}'
    +'td.ph{text-align:center}.dot{display:inline-block;width:10px;height:10px;border-radius:50%}'
    +'td.desc{font-weight:600;font-size:12px}.sub{font-weight:400;font-size:10px;color:#777;margin-top:1px}.muted{color:#aaa;font-weight:400}'
    +'td.span3{vertical-align:middle;background:#fbfaf6}'
    +'.spare{display:inline-block;padding:1px 6px;border-radius:10px;background:#eee;color:#999;font-size:9px;font-weight:700;letter-spacing:0.5px}'
    +'.rgt{border-left:2px solid #0d1b2e}'
    +'td.write{background:#f7f7f4;border-left:1px solid #ddd;border-right:1px solid #ddd}'
    +'.foot{margin-top:12px;font-size:10px;color:#aaa;text-align:center}';
  const bodyInner='<div class="sheet-wrap"><div class="sheet-scale">'
    +'<div class="hdr"><div class="brandwrap"><img class="rlogo" src="'+RLOGO+'"><div class="brand">DOLZELEC</div></div><div class="htitle">Switchboard Legend</div></div>'
    +'<div class="wrap">'
    +'<table class="mtab">'+metaRows+'</table>'
    +'<table class="leg"><thead><tr><th class="write">As labelled</th><th class="cnum">#</th>'+phHead+'<th>Circuit / description</th><th class="cnum rgt">#</th>'+phHead+'<th>Circuit / description</th><th class="write">As labelled</th></tr></thead><tbody>'+body+'</tbody></table>'
    +'<div class="foot">DolzElec Switchboard Legend &middot; '+esc(b.name||'Board')+' &middot; Printed '+esc(gen)+'</div>'
    +'</div></div></div>';
  const html='<!doctype html><html><head><meta charset="utf-8"><title>'+title+'</title><style>'+css+'</style></head><body>'+bodyInner+'</body></html>';
  return {b:b,site:site,html:html,title:title};
}
function printLegend(){
  const r=buildLegend();if(!r)return;
  const ifr=document.createElement('iframe');
  ifr.setAttribute('aria-hidden','true');
  // Render offscreen at ~A4 printable width so we can measure height and scale to fit one page.
  ifr.style.cssText='position:fixed;left:-9999px;top:0;width:703px;height:1040px;border:0;background:#fff';
  document.body.appendChild(ifr);
  let done=false;
  function fitOnePage(){
    try{
      const d=ifr.contentWindow.document;
      const inner=d.querySelector('.sheet-scale'),wrap=d.querySelector('.sheet-wrap');
      if(!inner||!wrap)return;
      const PRINTABLE_H=1030;   // A4 (297mm) minus 12mm top+bottom margins, at ~96dpi
      const h=inner.scrollHeight;
      if(h>PRINTABLE_H){
        const s=Math.max(0.35,(PRINTABLE_H-2)/h);
        inner.style.transform='scale('+s+')';
        wrap.style.height=Math.ceil(h*s)+'px';   // shrink layout box too, so print sees one page
      }
    }catch(e){}
  }
  function go(){
    if(done)return;done=true;
    fitOnePage();
    setTimeout(function(){try{ifr.contentWindow.focus();ifr.contentWindow.print();}catch(e){showToast('Print not available');}setTimeout(function(){ifr.remove();},1500);},300);
  }
  ifr.onload=go;
  const doc=ifr.contentWindow.document;doc.open();doc.write(r.html);doc.close();
  setTimeout(go,600);
}

function rcdLastTest(rcdId){
  return S.tests.filter(t=>t.rcd_id===rcdId).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date))[0]||null;
}
function statusFromTest(last,interval){
  if(!last||!last.test_date)return {key:'never',label:'Never tested',color:'#A32D2D',due:null,last:null};
  const due=new Date(last.test_date);due.setMonth(due.getMonth()+(interval||6));
  const days=(due-new Date())/86400000;
  if(days<0)return {key:'overdue',label:'Overdue',color:'#A32D2D',due,last};
  if(days<30)return {key:'due',label:'Due soon',color:'#854F0B',due,last};
  return {key:'ok',label:'Current',color:'#3B6D11',due,last};
}
function rcdStatusInfo(rcd){return statusFromTest(rcdLastTest(rcd.id),rcd.test_interval_months||6);}
// ── Device classifiers (V4.5): device_type free-text is one of MCB / RCBO / MCB 3φ / RCBO 3φ / Spare ──
function devBase(c){const dt=String((c&&c.device_type)||'');if(/^\s*RCBO/i.test(dt))return'RCBO';if(/^\s*Spare/i.test(dt))return'Spare';if(/^\s*MCB/i.test(dt))return'MCB';if(!dt&&c&&c.has_rcd)return'RCBO';return'MCB';}
function dev3ph(c){return /φ/.test(String((c&&c.device_type)||''))&&!/^\s*Spare/i.test(String((c&&c.device_type)||''));}
function isRcbo(c){return devBase(c)==='RCBO';}
function isMcb(c){return devBase(c)==='MCB';}
function isSpare(c){return devBase(c)==='Spare';}
function devTypeString(c){const base=devBase(c);if(base==='Spare')return'Spare';return base+(dev3ph(c)?' 3φ':'');}
function buildDeviceType(base,poles){if(base==='Spare')return'Spare';return base+(poles==='three'?' 3φ':'');}
function circuitStatusInfo(c){
  if(isSpare(c))return {key:'spare',label:'Spare',color:null,due:null,last:null};
  if(isRcbo(c)){
    const last=S.tests.filter(t=>t.circuit_id===c.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date))[0]||null;
    return statusFromTest(last,c.test_interval_months||6);
  }
  if(isMcb(c)&&c.protected_by_rcd_id){
    const rcd=(S.rcds||[]).find(r=>r.id===c.protected_by_rcd_id);
    if(rcd){const si=rcdStatusInfo(rcd);si.inherited=true;si.rcd=rcd;return si;}
  }
  return {key:'unprot',label:'Unprotected',color:null,due:null,last:null};
}

    h+=`</div>`;

    }else if(!S.plan.loaded){

      h+=`<div class="plan-wrap"><div class="plan-empty"><div style="font-size:30px">🗺️</div><div>Loading floor plan…</div></div></div>`;
    }else if(!S.plan.current){
      h+=`<div class="plan-wrap"><div class="plan-empty">
        <div style="font-size:34px">🗺️</div>
        <div style="font-size:14px;font-weight:700;color:#444">No floor plan yet</div>
        <div style="font-size:12px;max-width:250px;line-height:1.5">Upload a photo or scan of the floor plan, then drop electrical fittings onto it and link them to circuits.</div>
        ${S.readOnly?'':`<button class="add-btn" onclick="openAddPlan()">＋ Add floor plan</button>`}
      </div></div>`;
    }else{
      const p=S.plan.current;
      h+=`<div class="plan-wrap">
        <div class="plan-bar" id="plan-bar"></div>
        <div class="plan-stage" id="plan-stage">
          <svg class="plan-svg" id="plan-svg" viewBox="0 0 ${p.width||800} ${p.height||600}" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="plan-actions" id="plan-actions"></div>
      </div>`;
    }
  }

  // Only show bottombar back button if not reached via QR
  h+=`<div class="bottombar">
    <span style="font-size:11px;color:rgba(255,255,255,0.5)">⚡ ${esc(b.name)}</span>
    <span style="font-size:10px;color:rgba(255,255,255,0.4)">${S.readOnly?(S.currentUser?'👁 Read-only · '+esc(S.currentUser.name):'👁 Read-only · shared view'):(S.currentUser?'✓ '+esc(S.currentUser.name):'Tap Edit to log in')}</span>
  </div>`;

  app.innerHTML=h;
  if(S.tab==='plan'&&S.plan.loaded&&S.plan.current)setTimeout(initPlanTab,0);

function selCircuit(id){
  S.selectedCircuit=S.circuits.find(x=>x.id===id);
  set({view:'circuit',circuitTab:'info',modal:null});
}

// ── Circuit detail ────────────────────────────────────────────────────────────
function drawCircuit(app){
  const c=S.selectedCircuit;if(!c){set({view:'board'});return;}
  const myTests=S.tests.filter(t=>t.circuit_id===c.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date));
  const last=myTests[0];
  let nextDue=null,nextColor='#888';
  if(last&&last.test_date){
    nextDue=new Date(last.test_date);
    nextDue.setMonth(nextDue.getMonth()+(c.test_interval_months||6));
    const diff=(nextDue-new Date())/86400000;
    nextColor=diff<0?'#A32D2D':diff<30?'#854F0B':'#3B6D11';
  }
  const b=S.selectedBoard;
  const ph=phaseForSlot(parseInt(c.number)||1,b?.ways||24,b?.orientation,b?.supply_type||'three_phase');
  const phColor=phaseColor(ph);
  const phLabel={R:'Red phase',W:'White phase',B:'Blue phase',SP:'Single phase'}[ph]||'—';

  let h=`<div style="background:#0d1b2e;flex-shrink:0;padding-top:env(safe-area-inset-top,0px)">
    <div style="display:flex;align-items:center;gap:8px;padding:0 8px 0 12px">
      <img src="${LOGO}" alt="DolzElec" style="height:28px;width:auto;flex-shrink:0">
      <button class="back-btn" style="padding-left:0" onclick="set({view:'board',selectedCircuit:null,modal:null})">← Board</button>
    </div>
    <div style="padding:2px 16px 10px;display:flex;align-items:flex-start;gap:10px">
      <div style="width:6px;border-radius:3px;background:${phColor};align-self:stretch;flex-shrink:0;margin-top:2px"></div>
      <div><div style="font-size:18px;font-weight:700;color:#fff">Circuit ${esc(c.number)} — ${esc(c.label||'Unlabelled')}</div>
      <div style="font-size:11px;color:rgba(255,255,255,0.7);margin-top:2px">${esc(devTypeString(c))}${c.device_rating?' · '+esc(c.device_rating):''} · ${phLabel}</div></div>
    </div>
    <div class="nav-tabs">
      <div class="nav-tab ${S.circuitTab==='info'?'active':''}" onclick="set({circuitTab:'info'})">Info</div>
      <div class="nav-tab ${S.circuitTab==='rcd'?'active':''}" onclick="set({circuitTab:'rcd'})">RCD Tests</div>
    </div>
  </div><div class="scroll">`;

  if(c.isolated){
    h+=`<div class="iso-banner"><div class="iso-banner-t">⚠ ISOLATED — DO NOT RE-ENERGISE</div><div class="iso-banner-s">Locked out by ${esc(c.isolated_by||'—')}${c.isolated_at?' · '+fmtDate(c.isolated_at):''}</div>${c.isolation_reason?`<div class="iso-banner-s">${esc(c.isolation_reason)}</div>`:''}</div>`;
  }

  if(S.circuitTab==='info'){
    const fields=[
      ['Circuit number',esc(c.number||'—')],
      ['Neutral link',esc(c.neutral_link||'—')],
      ['Phase',phLabel],
      ['Protection device',esc(devTypeString(c)+(c.device_rating?' '+c.device_rating:''))],
      ['Cable size',esc(c.cable_size||'—')],
      ['Install date',fmtDate(c.install_date)],
      ['Last edited by',c.last_edited_by?esc(c.last_edited_by)+(c.last_edited_at?' · '+fmtDate(c.last_edited_at):''):'—']
    ];
    h+=`<div class="card">${fields.map(([l,v],i)=>`<div class="info-row"${i===fields.length-1?' style="border-bottom:none"':''}><span class="info-label">${l}</span><span class="info-val">${v}</span></div>`).join('')}</div>`;
    if(c.notes)h+=`<div class="card"><div class="section-label" style="margin-top:0">Notes</div><p style="font-size:13px;color:#333;line-height:1.6;margin-top:5px">${esc(c.notes)}</p></div>`;
    if(!S.readOnly){
      h+=`<div style="display:flex;gap:8px;margin-top:4px">
        <button class="add-btn" style="flex:1;justify-content:center" onclick="openEditCircuit()">✏ Edit circuit</button>
        <button class="ghost-btn" onclick="openModal('request')">+ Request icon</button>
      </div>`;
      h+=`<button class="ghost-btn" style="width:100%;margin-top:8px;justify-content:center;${c.isolated?'color:#3B6D11;border-color:#cfe3bd':'color:#A32D2D;border-color:#f3cccc'}" onclick="openModal('${c.isolated?'unisolate':'isolate'}')">${c.isolated?'🔓 Remove isolation':'🔒 Mark as isolated'}</button>`;
    }
  }else{
    const isRcboC=isRcbo(c);const spare=isSpare(c);
    const protRcd=(isMcb(c)&&c.protected_by_rcd_id)?(S.rcds||[]).find(r=>r.id===c.protected_by_rcd_id):null;
    if(spare){
      h+=`<div class="card" style="text-align:center;padding:24px"><p style="font-size:13px;color:#555;margin-bottom:6px">This is a <strong>spare / empty way</strong>.</p><p style="font-size:12px;color:#aaa">No device is fitted, so there's nothing to RCD-test.</p></div>`;
    } else if(isMcb(c)&&protRcd){
      const si=rcdStatusInfo(protRcd);
      const rtests=S.tests.filter(t=>t.rcd_id===protRcd.id).sort((a,b)=>new Date(b.test_date)-new Date(a.test_date));
      const rlast=rtests[0];let rnext=null;if(rlast&&rlast.test_date){rnext=new Date(rlast.test_date);rnext.setMonth(rnext.getMonth()+(protRcd.test_interval_months||6));}
      h+=`<div class="card" style="border-left:3px solid ${si.color||'#999'}">
        <div style="display:flex;justify-content:space-between;align-items:center"><div style="font-size:10px;color:#888;text-transform:uppercase;letter-spacing:0.6px">Protected by</div><span class="rcd-chip" style="background:${(si.color||'#999')}1a;color:${si.color||'#999'}">${si.label}</span></div>
        <div style="font-size:17px;font-weight:700;color:#111;margin-top:3px">${esc(protRcd.name||'RCD')} <span style="font-size:12px;font-weight:700;color:#2980b9">${rcdPolesLabel(protRcd.poles)}</span></div>
        ${protRcd.rating?`<div style="font-size:12px;color:#888;margin-top:1px">${esc(protRcd.rating)}</div>`:''}
        <div class="info-row" style="margin-top:8px"><span class="info-label">Last test</span><span class="info-val">${rlast?fmtDate(rlast.test_date):'Never tested'}</span></div>
        <div class="info-row" style="border-bottom:none"><span class="info-label">Next due</span><span class="info-val">${rnext?fmtDate(rnext):'\u2014'}</span></div>
      </div>
      <div class="info-note" style="margin-bottom:10px">This MCB inherits its RCD's status \u2014 test the RCD, not the circuit.</div>
      ${S.readOnly?'':`<button class="add-btn" style="width:100%;justify-content:center;margin-bottom:14px" onclick="openRcdTestFrom('${protRcd.id}')">\u26a1 Test ${esc(protRcd.name||'RCD')}</button>`}
      <div class="section-label">RCD test history</div>`;
      if(!rtests.length){h+=`<div class="card" style="text-align:center;color:#aaa;font-size:13px;padding:24px">No tests logged yet</div>`;}
      else h+=`<div class="card">${rtests.map((t,i)=>`<div class="test-row"${i===rtests.length-1?' style="border-bottom:none"':''}><span style="color:#888;width:80px;flex-shrink:0">${fmtDate(t.test_date)}</span><span style="font-weight:600;width:50px;flex-shrink:0">${t.trip_time_ms!=null?t.trip_time_ms+'ms':'\u2014'}</span><span style="flex:1;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.tested_by||'\u2014')}</span><span style="font-weight:700;font-size:10px;color:${t.result==='pass'?'#3B6D11':'#A32D2D'};flex-shrink:0">${(t.result||'').toUpperCase()}</span></div>`).join('')}</div>`;
    } else if(!isRcboC){
      h+=`<div class="card" style="text-align:center;padding:24px"><p style="font-size:13px;color:#555;margin-bottom:6px">This circuit is an <strong>MCB</strong> with no RCD assigned.</p><p style="font-size:12px;color:#aaa;margin-bottom:${S.readOnly?'0':'14px'}">Assign a shared RCD so it inherits earth-leakage test status.</p>${S.readOnly?'':`<button class="add-btn" style="margin:0 auto;justify-content:center" onclick="openEditCircuit()">Assign an RCD</button>`}</div>`;
    }else{
      const tf=[
        ['Test interval',(c.test_interval_months||6)+' months',''],
        ['Last test',last?fmtDate(last.test_date):'Never tested',''],
        ['Last result',last?(last.result||'').toUpperCase():'—',last?'color:'+(last.result==='pass'?'#3B6D11':'#A32D2D'):''],
        ['Next due',nextDue?fmtDate(nextDue):'—','color:'+nextColor]
      ];
      h+=`<div class="card">${tf.map(([l,v,st],i)=>`<div class="info-row"${i===3?' style="border-bottom:none"':''}><span class="info-label">${l}</span><span class="info-val"${st?' style="'+st+'"':''}>${v}</span></div>`).join('')}</div>`;
      h+=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div class="section-label" style="margin:0">Test history</div>${S.readOnly?'':`<button class="add-btn" onclick="openModal('rcd')">+ Log test</button>`}</div>`;
      if(!myTests.length){h+=`<div class="card" style="text-align:center;color:#aaa;font-size:13px;padding:24px">No tests logged yet</div>`;}
      else h+=`<div class="card">${myTests.map((t,i)=>`<div class="test-row"${i===myTests.length-1?' style="border-bottom:none"':''}><span style="color:#888;width:80px;flex-shrink:0">${fmtDate(t.test_date)}</span><span style="font-weight:600;width:50px;flex-shrink:0">${t.trip_time_ms!=null?t.trip_time_ms+'ms':'—'}</span><span style="flex:1;color:#888;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.tested_by||'—')}</span><span style="font-weight:700;font-size:10px;color:${t.result==='pass'?'#3B6D11':'#A32D2D'};flex-shrink:0">${(t.result||'').toUpperCase()}</span></div>`).join('')}</div>`;
    }
  }
  h+=`</div>`;
  app.innerHTML=h;
}

// ── Modals ────────────────────────────────────────────────────────────────────
function openAddCircuit(slotNum){
  if(S.readOnly){promptLogin();return;}
  S._circuitDraft=null;S._rcdReturn=false;
  S._addSlot=slotNum;
  S.modal='add-circuit';
  drawModal();
}

function openModal(type){if(S.readOnly){promptLogin();return;}S.modal=type;drawModal();}
function closeModal(){S.modal=null;S._circuitDraft=null;S._rcdReturn=false;document.querySelector('.modal-overlay')?.remove();}

function drawModal(){
  document.querySelector('.modal-overlay')?.remove();
  if(!S.modal)return;
  const c=S.selectedCircuit;
  const loggedIn=!!S.currentUser;
  const pinField=`<label class="field-label">Your PIN</label><input class="pin-input" id="m-pin" type="password" inputmode="numeric" maxlength="4" placeholder="••••"><div class="err-msg" id="m-err"></div>`;
  const whoLine=loggedIn?`<div style="font-size:12px;color:#555;margin-bottom:14px">As: <strong>${esc(S.currentUser.name)}</strong></div>`:`<div class="info-note">Enter your PIN — edits are stamped with your name</div>`;
  let body='';

  if(S.modal==='add-circuit'){
    const slot=S._addSlot||1;
    const b=S.selectedBoard;
    const ph=phaseForSlot(slot,b?.ways||24,b?.orientation,b?.supply_type||'three_phase');
    const phLabel={R:'Red phase',W:'White phase',B:'Blue phase',SP:'Single phase'}[ph]||'—';
    const phColor=phaseColor(ph);
    const dft=(S._circuitDraft&&S._circuitDraft.kind==='add')?S._circuitDraft:null;
    const dt=dft?dft.devtype:'MCB';const poles=dft?dft.poles:'single';const rating=dft?dft.rating:'';const protBy=dft?dft.protby:'';

      <div style="width:6px;height:40px;border-radius:3px;background:${phColor};flex-shrink:0"></div>
      <div><div class="modal-title" style="margin-bottom:2px">Add circuit ${slot}</div>
      <div style="font-size:12px;color:#888">${phLabel} · ${esc(b?.name||'')}</div></div>
    </div>
    ${whoLine}
    <label class="field-label">Label *</label><input class="field-input" id="ac-label" value="${dft?esc(dft.label):''}" placeholder="e.g. Kitchen Appliances">
    <label class="field-label">Neutral link no. *</label><input class="field-input" id="ac-nl" value="${dft?esc(dft.nl):''}" inputmode="numeric" placeholder="e.g. 12">
    ${deviceSectionHtml('ac',dt,poles,rating,protBy,6,false)}
    <label class="field-label">Cable size</label><input class="field-input" id="ac-cable" value="${dft?esc(dft.cable):''}" placeholder="e.g. 2.5mm² TPS">
    <label class="field-label">Install date</label><input class="field-input" id="ac-date" type="date" value="${dft?esc(dft.date):''}">
    <label class="field-label">Notes</label><textarea class="field-textarea" id="ac-notes" placeholder="Any notes about this circuit…">${dft?esc(dft.notes):''}</textarea>
    ${!loggedIn?pinField:''}
    ${loggedIn?'<div class="err-msg" id="m-err"></div>':''}
    <button class="primary-btn" id="m-save" onclick="saveAddCircuit()">Add circuit</button>
    <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }
  else if(S.modal==='edit'&&c){
    const dft=(S._circuitDraft&&S._circuitDraft.kind==='edit'&&S._circuitDraft.circuitId===c.id)?S._circuitDraft:null;
    const dt=dft?dft.devtype:devBase(c);const poles=dft?dft.poles:(dev3ph(c)?'three':'single');
    const rating=dft?dft.rating:(c.device_rating||'');const protBy=dft?dft.protby:(c.protected_by_rcd_id||'');
    body=`<div class="modal-title">Edit — Circuit ${esc(c.number)}</div>${whoLine}
      <label class="field-label">Label</label><input class="field-input" id="e-label" value="${dft?esc(dft.label):esc(c.label||'')}" placeholder="e.g. Kitchen Appliances">
      <label class="field-label">Neutral link no. *</label><input class="field-input" id="e-nl" value="${dft?esc(dft.nl):esc(c.neutral_link||'')}" inputmode="numeric" placeholder="e.g. 12">
      ${deviceSectionHtml('e',dt,poles,rating,protBy,c.test_interval_months||6,true)}
      <label class="field-label">Cable size</label><input class="field-input" id="e-cable" value="${dft?esc(dft.cable):esc(c.cable_size||'')}" placeholder="e.g. 2.5mm² TPS">
      <label class="field-label">Notes</label><textarea class="field-textarea" id="e-notes" placeholder="Any notes…">${dft?esc(dft.notes):esc(c.notes||'')}</textarea>
      ${!loggedIn?pinField:''}
      ${loggedIn?'<div class="err-msg" id="m-err"></div>':''}
      <button class="primary-btn" id="m-save" onclick="saveEdit()">Save changes</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>
      <div style="margin-top:16px;padding-top:16px;border-top:0.5px solid #eee">
        <button onclick="openModal('archive')" style="width:100%;background:transparent;border:0.5px solid #f5c6c6;border-radius:10px;padding:10px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;color:#A32D2D">Archive circuit</button>
      </div>`;
  }else if(S.modal==='archive'&&c){
    const deleteDate=new Date();
    deleteDate.setMonth(deleteDate.getMonth()+18);
    body=`<div class="modal-title">Archive circuit</div>
      <p style="font-size:13px;color:#555;margin-bottom:6px;line-height:1.6">Archiving <strong>Circuit ${esc(c.number)} — ${esc(c.label||'Unlabelled')}</strong> will remove it from the board grid.</p>
      <p style="font-size:12px;color:#888;margin-bottom:16px;line-height:1.6">It will be permanently deleted on <strong>${deleteDate.toLocaleDateString('en-AU')}</strong> (18 months from today) unless restored before then.</p>
      ${whoLine}
      ${!loggedIn?pinField:''}
      <button class="primary-btn" id="m-save" style="background:#A32D2D;color:#fff" onclick="saveArchive()">Archive circuit</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }else if(S.modal==='rcd'&&c){

      <label class="field-label">Trip time (ms)</label><input class="field-input" id="r-ms" type="number" inputmode="decimal" placeholder="e.g. 18">

      <label class="field-label">Notes (optional)</label><textarea class="field-textarea" id="r-notes" placeholder="Any observations…"></textarea>
      ${!loggedIn?pinField:''}
      <button class="primary-btn" id="m-save" onclick="saveRCD()">Save test</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }else if(S.modal==='request'){
    body=`<div class="modal-title">Request a new icon</div><p style="font-size:12px;color:#888;margin-bottom:14px;line-height:1.5">Come across a fitting not in the library? Declan will add it.</p>${whoLine}

      <label class="field-label">Description</label><textarea class="field-textarea" id="q-desc" placeholder="Mounting type, size, brand…"></textarea>

      ${!loggedIn?pinField:''}

      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }

      <label class="field-label">Reason (recommended)</label><input class="field-input" id="iso-reason" placeholder="e.g. Replacing RCBO — do not re-energise">
      ${!loggedIn?pinField:''}

      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }
  else if(S.modal==='unisolate'&&c){
    body=`<div class="modal-title">Remove isolation</div>
      <p style="font-size:13px;color:#555;margin-bottom:6px;line-height:1.5">Clears the isolation flag on <strong>Circuit ${esc(c.number)} — ${esc(c.label||'Unlabelled')}</strong>.</p>
      ${c.isolated_by?`<p style="font-size:12px;color:#888;margin-bottom:14px;line-height:1.5">Isolated by ${esc(c.isolated_by)}${c.isolated_at?' on '+fmtDate(c.isolated_at):''}.</p>`:''}
      ${whoLine}
      ${!loggedIn?pinField:''}
      <button class="primary-btn" id="m-save" style="background:#3B6D11;color:#fff" onclick="saveUnisolate()">🔓 Remove isolation</button>
      <button class="cancel-btn" onclick="closeModal()">Cancel</button>`;
  }
  else if(S.modal==='supply'){
    const bd=S.selectedBoard;
    body=`<div class="modal-title">Supply &amp; main switch</div>
      <p style="font-size:12px;color:#888;margin-bottom:14px;line-height:1.5">Reference details for ${esc(bd.name)}. Leave any field blank if not known.</p>

      <label class="field-label">Supply type</label>
      <select class="field-input" id="su-type"><option value="single_phase"${bd.supply_type==='single_phase'?' selected':''}>Single phase</option><option value="three_phase"${bd.supply_type==='three_phase'?' selected':''}>Three phase</option></select>

// V4.6: a 3-phase breaker occupies its way + the next two in the same display column.
// Saving one absorbs any circuits already sitting in those two ways (archived — reversible from
// the List view), so a single 3φ breaker renders as one card spanning three, not three separate ones.
async function absorbThreePhaseSlots(n,selfId,userName){
  if(isNaN(n))return true;
  const bd=S.selectedBoard||{};
  const ways=bd.ways||24;
  const bySlot={};
  S.circuits.forEach(x=>{const nn=parseInt(x.number);if(!isNaN(nn))bySlot[nn]=x;});
  const conflicts=[];
  for(const s of threePhaseNeighbors(n,ways,bd.orientation)){const cc=bySlot[s];if(cc&&cc.id!==selfId)conflicts.push(cc);}
  if(!conflicts.length)return true;
  const names=conflicts.map(c=>'Circuit '+c.number+(c.label?' — '+c.label:'')).join(' and ');
  if(!confirm('This 3-phase breaker occupies 3 ways.\n\n'+names+' will be archived (you can restore them anytime from the List view). Continue?'))return false;
  for(const cc of conflicts){
    try{await sb('circuits?id=eq.'+cc.id,{method:'PATCH',body:JSON.stringify({archived_at:new Date().toISOString(),archived_by:userName,last_edited_by:userName,last_edited_at:new Date().toISOString()})});}
    catch(e){showToast('Could not archive Circuit '+cc.number+': '+((e&&e.message)||'error'));return false;}
  }
  S.circuits=S.circuits.filter(x=>!conflicts.some(c=>c.id===x.id));
  return true;
}

}

// ── Admin ─────────────────────────────────────────────────────────────────────
// ── V4.2 (Step 4): user management (owner + site admins) ──
function isOwner(){return !!(S.currentUser&&S.currentUser.is_owner);}
// ── V4.7: per-site roles. 'viewer' = read-only (a customer login). ──
function roleForSite(siteId){
  if(isOwner())return 'owner';
  const r=(S.myRoles||[]).find(x=>x.site_id===siteId);
  return r?r.role:null;
}
function canEditSite(siteId){const r=roleForSite(siteId);return r==='owner'||r==='admin'||r==='member';}
function isSiteAdminOf(siteId){const r=roleForSite(siteId);return r==='owner'||r==='admin';}
function myAdminSiteIds(){
  if(isOwner())return (S.sites||[]).map(s=>s.id);
  return (S.myRoles||[]).filter(r=>r.role==='admin').map(r=>r.site_id);
}
function isManager(){return isOwner()||myAdminSiteIds().length>0;}
function siteName(id){const s=(S.sites||[]).find(x=>x.id===id);return s?s.name:('Site '+String(id||'').slice(0,6));}
async function loadUsers(){
  if(S.um&&S.um.loading)return;
  S.um=Object.assign({loaded:false,loading:true,profiles:[],userSites:[]},S.um||{},{loading:true});
  try{
    const[profiles,userSites]=await Promise.all([
      sb('profiles?select=id,name,is_owner'),
      sb('user_sites?select=user_id,site_id,role')
    ]);
    S.um={loaded:true,loading:false,profiles:profiles||[],userSites:userSites||[]};
  }catch(e){S.um={loaded:true,loading:false,profiles:[],userSites:[],error:e.message};}
  if(S.view==='admin'&&S.adminTab==='users')draw();
}
// ── V4.8: the three per-site roles. Kept in one place so no screen can drift. ──
const USER_ROLES=[['admin','Admin'],['member','Member'],['viewer','Viewer']];
function roleOptionsHtml(sel){
  const cur=String(sel||'');
  const known=USER_ROLES.some(r=>r[0]===cur);
  let o=USER_ROLES.map(function(r){return `<option value="${r[0]}"${r[0]===cur?' selected':''}>${r[1]}</option>`;}).join('');
  // Never silently relabel an unrecognised role as something else — surface it.
  if(cur&&!known)o=`<option value="${esc(cur)}" selected>${esc(cur)}</option>`+o;
  return o;
}
function currentUserAdminScope(){
  const adminIds=myAdminSiteIds();
  if(S.adminCustomer!=null)return sitesForCustomer(S.adminCustomer).map(s=>s.id).filter(id=>isOwner()||adminIds.indexOf(id)>=0);
  return adminIds;
}
function canDeleteLogin(uid){
  const p=((S.um&&S.um.profiles)||[]).find(x=>x.id===uid);
  if(p&&p.is_owner)return false;
  if(uid===(S.currentUser&&S.currentUser.id))return false;
  if(isOwner())return true;
  const adminIds=myAdminSiteIds();
  const tSites=((S.um&&S.um.userSites)||[]).filter(r=>r.user_id===uid).map(r=>r.site_id);
  return tSites.length>0&&tSites.every(s=>adminIds.indexOf(s)>=0);
}
async function deleteUserLogin(uid){
  const p=((S.um&&S.um.profiles)||[]).find(x=>x.id===uid)||{};
  if(!confirm('Permanently delete '+(p.name||'this login')+'?\n\nThis removes their account entirely and frees the email to be used again. It cannot be undone.'))return;
  try{
    const r=await fetch(`${DB_URL}/functions/v1/delete-user`,{method:'POST',headers:{apikey:DB_KEY,Authorization:`Bearer ${authToken()}`,'Content-Type':'application/json'},body:JSON.stringify({user_id:uid})});
    const t=await r.text();const j=t?JSON.parse(t):null;
    if(!r.ok)throw new Error((j&&(j.error||j.message))||('Delete failed ('+r.status+')'));
    if(S.um){S.um.userSites=(S.um.userSites||[]).filter(x=>x.user_id!==uid);S.um.profiles=(S.um.profiles||[]).filter(x=>x.id!==uid);}
    draw();showToast('✓ Login deleted');
  }catch(e){showToast('Failed: '+((e&&e.message)||'unknown'));}
}
function drawUsersAdmin(scopeSiteIds){
  if(!isManager())return `<div class="info-note">You don't have permission to manage users. Ask an owner or a site admin for access.</div>`;
  const adminIds=myAdminSiteIds();
  const scope=(scopeSiteIds!=null)?scopeSiteIds.filter(id=>isOwner()||adminIds.indexOf(id)>=0):adminIds;
  const multi=scope.length>1;
  let h='';
  if(scopeSiteIds==null)h+=`<div class="info-note">Create logins and manage who can access your site${multi?'s':''}.${isOwner()?' As owner you can manage every site.':''}</div>`;
  h+=`<div style="display:flex;gap:6px;margin-bottom:10px"><button class="add-btn" style="flex:1;justify-content:center" onclick="openCreateLogin()">+ Create login</button><button class="ghost-btn" style="flex:1;justify-content:center" onclick="openAddExistingUser()">+ Existing user</button></div>`;
  if(!(S.um&&S.um.loaded)){
    if(!(S.um&&S.um.loading))setTimeout(loadUsers,0);
    h+=`<div class="card" style="text-align:center;color:#aaa;padding:24px;font-size:13px">Loading users…</div>`;return h;
  }
  if(S.um.error){h+=`<div class="card" style="text-align:center;color:#A32D2D;padding:20px;font-size:12px">Couldn't load users: ${esc(S.um.error)}</div>`;return h;}
  const rows=(S.um.userSites||[]).filter(r=>scope.indexOf(r.site_id)>=0);
  const byUser={};rows.forEach(r=>{(byUser[r.user_id]=byUser[r.user_id]||[]).push(r);});
  const pmap={};(S.um.profiles||[]).forEach(p=>{pmap[p.id]=p;});
  const uids=Object.keys(byUser);
  if(!uids.length){h+=`<div class="card" style="text-align:center;color:#aaa;padding:24px;font-size:13px">No users assigned${multi?' to these sites':''} yet. Use “Create login” to add someone.</div>`;return h;}
  uids.forEach(uid=>{
    const p=pmap[uid]||{};
    h+=`<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px"><div style="font-weight:600;font-size:14px">${esc(p.name||'(name not visible)')}${p.is_owner?' <span style="font-size:10px;color:#f0a500;font-weight:700">OWNER</span>':''}</div>${canDeleteLogin(uid)?`<button class="ghost-btn" style="width:auto;padding:4px 9px;margin:0;font-size:11px;color:#A32D2D;border-color:#f3cccc" onclick="deleteUserLogin('${uid}')">Delete login</button>`:''}</div>`;
    byUser[uid].forEach(r=>{
      h+=`<div class="info-row"><span class="info-label">${esc(siteName(r.site_id))}</span><span class="info-val" style="display:flex;gap:8px;align-items:center">
        <select class="field-input" style="margin:0;width:auto;padding:4px 24px 4px 8px;font-size:11px;font-weight:600" onchange="setUserRole('${r.user_id}','${r.site_id}',this.value)">${roleOptionsHtml(r.role)}</select>
        <span onclick="removeUserSite('${r.user_id}','${r.site_id}','${esc(siteName(r.site_id)).replace(/'/g,'')}')" style="cursor:pointer;color:#A32D2D;font-size:16px;line-height:1" title="Remove from site">✕</span>
      </span></div>`;
    });
    const assigned=byUser[uid].map(r=>r.site_id);const avail=scope.filter(id=>assigned.indexOf(id)<0);
    if(avail.length){
      h+=`<div style="display:flex;gap:6px;margin-top:8px"><select class="field-input" id="assign-${uid}" style="margin:0;flex:1"><option value="">Assign to another site…</option>${avail.map(id=>`<option value="${id}">${esc(siteName(id))}</option>`).join('')}</select><select class="field-input" id="assign-role-${uid}" style="margin:0;width:auto">${roleOptionsHtml('member')}</select><button class="ghost-btn" style="width:auto;padding:8px 14px;margin:0" onclick="assignUserSite('${uid}')">Add</button></div>`;
    }
    h+=`</div>`;
  });
  // Orphaned logins: accounts that exist but have no site access (owner-only, top level).
  // Without this they'd be invisible yet still hold their email — impossible to delete or reuse.
  if(scopeSiteIds==null&&isOwner()){
    const granted=new Set((S.um.userSites||[]).map(r=>r.user_id));
    const orphans=(S.um.profiles||[]).filter(p=>!p.is_owner&&!granted.has(p.id));
    if(orphans.length){
      h+=`<div class="section-label" style="margin-top:14px">Logins with no site access</div>`;
      h+=`<div class="info-note" style="margin-bottom:8px">These accounts exist but aren't assigned to any site. Delete one to free up its email, or use “Create login” to re-assign it.</div>`;
      orphans.forEach(p=>{
        h+=`<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:8px">
          <div style="min-width:0"><div style="font-size:14px;font-weight:600">${esc(p.name||'(no name)')}</div></div>
          <button class="ghost-btn" style="width:auto;padding:5px 10px;margin:0;font-size:11px;color:#A32D2D;border-color:#f3cccc;flex-shrink:0" onclick="deleteUserLogin('${p.id}')">Delete login</button>
        </div>`;
      });
    }
  }
  return h;
}
function openCreateLogin(){
  const scope=currentUserAdminScope();
  if(!scope.length){showToast('No sites available to assign');return;}
  const opts=scope.map(id=>`<option value="${id}">${esc(siteName(id))}</option>`).join('');
  showModal(`<div class="modal-title">Create a login</div>
    <div class="info-note" style="margin-bottom:12px">Emails them an invite link to set their own password, and gives them access to this site. Choose <strong>Viewer</strong> for a customer — they can look, but not change anything.</div>
    <label class="field-label">Name</label><input class="field-input" id="cl-name" placeholder="e.g. Jordan Smith">
    <label class="field-label">Email</label><input class="field-input" id="cl-email" type="email" inputmode="email" autocapitalize="none" placeholder="jordan@example.com">
    <label class="field-label">Site</label><select class="field-input" id="cl-site">${opts}</select>
    <label class="field-label">Role</label><select class="field-input" id="cl-role"><option value="member">Member — can view &amp; edit</option><option value="admin">Admin — can also manage users</option><option value="viewer">Viewer — read-only (customer)</option></select>
    <div class="err-msg" id="cl-err"></div>
    <button class="primary-btn" id="cl-go" onclick="submitCreateLogin()">Create login</button>
    <button class="cancel-btn" onclick="closeAnyModal()">Cancel</button>`);
